<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智枢文档</title>
    <style>
      :root {
        --bg-0: #141923;
        --bg-1: #181f2b;
        --bg-2: #1d2430;
        --glass: rgba(13, 19, 35, 0.68);
        --glass-strong: rgba(12, 18, 34, 0.86);
        --stroke: rgba(116, 141, 206, 0.18);
        --stroke-strong: rgba(98, 129, 210, 0.46);
        --text-main: rgba(242, 246, 255, 0.96);
        --text-sub: rgba(208, 219, 245, 0.68);
        --text-on-brand: #ffffff;
        --brand: #5c7db8;
        --brand-2: #4f6ea2;
        --bg-glow-1: rgba(92, 125, 184, 0.04);
        --bg-glow-2: rgba(79, 110, 162, 0.03);
        --bg-glow-3: rgba(92, 125, 184, 0.02);
        --orb-1: rgba(92, 125, 184, 0.04);
        --orb-2: rgba(79, 110, 162, 0.03);
        --title-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        --shell-bg: linear-gradient(145deg, rgba(19, 25, 35, 0.92), rgba(27, 35, 47, 0.9));
        --shell-glow: rgba(92, 125, 184, 0.04);
        --shell-inner: rgba(92, 125, 184, 0.04);
        --topbar-stroke: rgba(132, 165, 255, 0.14);
        --field-bg: transparent;
        --field-border: rgba(116, 141, 206, 0.26);
        --field-focus: rgba(59, 130, 246, 0.82);
        --field-focus-ring: rgba(59, 130, 246, 0.22);
        --field-focus-glow: rgba(59, 130, 246, 0.2);
        --field-icon: rgba(208, 219, 245, 0.82);
        --field-text: rgba(242, 246, 255, 0.96);
        --field-placeholder: rgba(208, 219, 245, 0.42);
        --button-border: rgba(59, 130, 246, 0.44);
        --button-overlay-1: rgba(92, 125, 184, 0.1);
        --button-overlay-2: rgba(79, 110, 162, 0.14);
        --button-shadow-1: rgba(0, 0, 0, 0.2);
        --button-shadow-2: rgba(0, 0, 0, 0.08);
        --button-shadow-hover-1: rgba(0, 0, 0, 0.24);
        --button-shadow-hover-2: rgba(0, 0, 0, 0.12);
        --dropzone-border: rgba(116, 141, 206, 0.34);
        --dropzone-glow: rgba(92, 125, 184, 0.06);
        --dropzone-bg: rgba(13, 19, 35, 0.72);
        --dropzone-shine: rgba(92, 125, 184, 0.1);
        --dropzone-hover-inner: rgba(92, 125, 184, 0.08);
        --dropzone-hover-glow: rgba(92, 125, 184, 0.06);
        --dropzone-drag-inner: rgba(92, 125, 184, 0.1);
        --dropzone-drag-glow: rgba(92, 125, 184, 0.08);
        --panel-bg: rgba(13, 19, 35, 0.58);
        --panel-border: rgba(116, 141, 206, 0.2);
        --section-divider: rgba(116, 141, 206, 0.18);
        --status-loading-bg: rgba(37, 99, 235, 0.16);
        --status-loading-text: rgba(164, 198, 255, 0.96);
        --status-loading-border: rgba(59, 130, 246, 0.28);
        --success-bg: rgba(16, 185, 129, 0.14);
        --success-text: rgba(152, 255, 218, 0.92);
        --error-bg: rgba(239, 68, 68, 0.16);
        --error-text: rgba(255, 190, 190, 0.96);
        --shadow-xl: 0 14px 34px rgba(1, 7, 20, 0.42);
      }

      body[data-theme="light"] {
        --bg-0: #eef1f5;
        --bg-1: #e7ebf0;
        --bg-2: #f4f6f8;
        --glass: rgba(248, 251, 255, 0.78);
        --glass-strong: rgba(251, 253, 255, 0.92);
        --stroke: rgba(105, 130, 182, 0.34);
        --stroke-strong: rgba(74, 106, 171, 0.52);
        --text-main: #0f1b32;
        --text-sub: #5a6f92;
        --text-on-brand: #ffffff;
        --brand: #4b6fa9;
        --brand-2: #3f5f92;
        --bg-glow-1: rgba(75, 111, 169, 0.03);
        --bg-glow-2: rgba(75, 111, 169, 0.02);
        --bg-glow-3: rgba(75, 111, 169, 0.015);
        --orb-1: rgba(75, 111, 169, 0.02);
        --orb-2: rgba(75, 111, 169, 0.015);
        --title-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
        --shell-bg: linear-gradient(145deg, rgba(249, 251, 253, 0.97), rgba(241, 245, 249, 0.97));
        --shell-glow: rgba(75, 111, 169, 0.03);
        --shell-inner: rgba(75, 111, 169, 0.04);
        --topbar-stroke: rgba(121, 146, 190, 0.26);
        --field-bg: rgba(244, 249, 255, 0.92);
        --field-border: rgba(182, 200, 230, 0.95);
        --field-focus: rgba(37, 99, 235, 0.8);
        --field-focus-ring: rgba(37, 99, 235, 0.22);
        --field-focus-glow: rgba(37, 99, 235, 0.16);
        --field-icon: rgba(79, 104, 146, 0.84);
        --field-text: #10203b;
        --field-placeholder: rgba(103, 126, 163, 0.78);
        --button-border: rgba(134, 165, 219, 0.72);
        --button-overlay-1: rgba(255, 255, 255, 0.28);
        --button-overlay-2: rgba(191, 219, 254, 0.16);
        --button-shadow-1: rgba(28, 43, 66, 0.14);
        --button-shadow-2: rgba(28, 43, 66, 0.06);
        --button-shadow-hover-1: rgba(28, 43, 66, 0.2);
        --button-shadow-hover-2: rgba(28, 43, 66, 0.08);
        --dropzone-border: rgba(163, 186, 224, 0.9);
        --dropzone-glow: rgba(75, 111, 169, 0.04);
        --dropzone-bg: rgba(247, 251, 255, 0.94);
        --dropzone-shine: rgba(75, 111, 169, 0.07);
        --dropzone-hover-inner: rgba(75, 111, 169, 0.05);
        --dropzone-hover-glow: rgba(75, 111, 169, 0.04);
        --dropzone-drag-inner: rgba(75, 111, 169, 0.06);
        --dropzone-drag-glow: rgba(75, 111, 169, 0.05);
        --panel-bg: rgba(247, 251, 255, 0.93);
        --panel-border: rgba(188, 208, 237, 0.92);
        --section-divider: rgba(198, 217, 241, 0.86);
        --status-loading-bg: rgba(239, 246, 255, 0.8);
        --status-loading-text: #2563eb;
        --status-loading-border: rgba(191, 219, 254, 0.8);
        --success-bg: rgba(236, 253, 245, 0.8);
        --success-text: #059669;
        --error-bg: rgba(254, 242, 242, 0.8);
        --error-text: #dc2626;
        --shadow-xl: 0 10px 24px rgba(33, 67, 128, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 24px 16px;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text-main);
        background: linear-gradient(145deg, var(--bg-0) 0%, var(--bg-1) 46%, var(--bg-2) 100%);
        overflow-x: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        pointer-events: none;
        z-index: 0;
        border-radius: 999px;
        display: none;
      }

      body::before {
        width: 260px;
        height: 260px;
        left: -70px;
        top: 16%;
        background: var(--orb-1);
      }

      body::after {
        width: 230px;
        height: 230px;
        right: -56px;
        bottom: 12%;
        background: var(--orb-2);
        animation-delay: 1.2s;
      }

      body[data-theme="light"]::before,
      body[data-theme="light"]::after {
        display: none;
      }

      @keyframes floatGlow {
        from { transform: translateY(0); }
        to { transform: translateY(-16px); }
      }

      .page {
        width: 100%;
        max-width: 1100px;
        margin: 0 auto;
        position: relative;
        z-index: 1;
      }

      body.task-page {
        padding: 16px 12px;
      }

      body.task-page .page {
        max-width: 1240px;
      }

      .page::before {
        content: "";
        position: absolute;
        inset: 80px 8% auto;
        height: 420px;
        pointer-events: none;
        background: none;
        filter: none;
        opacity: 0;
        z-index: -1;
      }

      .brand {
        text-align: center;
        margin-bottom: 34px;
      }

      .brand-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .brand h1 {
        margin: 0;
        font-size: clamp(32px, 4vw, 44px);
        line-height: 1.16;
        letter-spacing: 0.2px;
        font-weight: 760;
        text-shadow: var(--title-shadow);
      }

      .brand-slogan {
        margin: 0;
        font-size: clamp(15px, 1.85vw, 17px);
        font-weight: 600;
        letter-spacing: 0.12em;
        line-height: 1.55;
      }

      body.task-page .brand-slogan {
        display: none !important;
      }

      body:not(.task-page) .brand .product-tagline {
        display: none !important;
      }

      .brand .product-tagline {
        margin: 0;
        max-width: min(36rem, 92vw);
        font-size: clamp(15px, 1.9vw, 17px);
        font-weight: 520;
        letter-spacing: 0.04em;
        line-height: 1.45;
        color: color-mix(in srgb, var(--text-main) 82%, var(--brand) 18%);
      }

      body.task-page .brand {
        text-align: left;
        margin-bottom: 18px;
      }

      body.task-page .brand-inner {
        flex-direction: row;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 10px 14px;
      }

      body.task-page .brand h1 {
        font-size: clamp(20px, 2.4vw, 24px);
        line-height: 1.2;
        letter-spacing: 0.12px;
      }

      body.task-page .brand .product-tagline {
        max-width: none;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.02em;
        color: var(--text-sub);
      }

      body.task-page .brand .product-tagline::before {
        content: "";
        display: inline-block;
        width: 4px;
        height: 4px;
        margin: 0 10px 0 2px;
        border-radius: 50%;
        vertical-align: 0.2em;
        background: color-mix(in srgb, var(--brand) 55%, var(--text-sub) 45%);
        opacity: 0.85;
      }

      /* 右上角统一工具栏（主题 / 用户 / 退出） */
      .top-bar-icon-btn {
        width: 38px;
        height: 38px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: none;
        border-radius: 11px;
        background: transparent;
        color: var(--text-main);
        font-size: 0;
        padding: 0;
        cursor: pointer;
        flex-shrink: 0;
        transition:
          background 0.2s ease,
          color 0.2s ease,
          transform 0.08s ease;
      }

      .top-bar-icon-btn:hover {
        background: color-mix(in srgb, var(--brand) 18%, transparent);
        color: var(--brand);
      }

      .top-bar-icon-btn:active {
        transform: scale(0.96);
      }

      .top-bar-icon-btn svg {
        width: 19px;
        height: 19px;
      }

      .shell {
        background: var(--shell-bg);
        border: 1px solid var(--stroke);
        border-radius: 18px;
        box-shadow: var(--shadow-xl), 0 0 0 1px var(--shell-inner) inset;
        backdrop-filter: blur(22px);
        -webkit-backdrop-filter: blur(22px);
        padding: 22px;
      }

      .shell.login-shell {
        max-width: 560px;
        margin: 0 auto;
      }

      .session-boot {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        min-height: 200px;
        padding: 28px 16px 20px;
        text-align: center;
      }

      .session-boot-spinner {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 3px solid color-mix(in srgb, var(--brand) 22%, transparent);
        border-top-color: var(--brand);
        animation: sessionBootSpin 0.75s linear infinite;
      }

      @keyframes sessionBootSpin {
        to {
          transform: rotate(360deg);
        }
      }

      .session-boot-text {
        margin: 0;
        font-size: 14px;
        color: var(--text-sub);
        letter-spacing: 0.02em;
      }

      .top-actions {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 40;
        display: flex;
        justify-content: flex-end;
      }

      .top-actions-bar {
        display: flex;
        align-items: center;
        flex-wrap: nowrap;
        gap: 0;
        min-height: 48px;
        padding: 5px 6px 5px 5px;
        border-radius: 14px;
        border: 1px solid var(--stroke);
        background: var(--glass-strong);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow:
          0 10px 32px color-mix(in srgb, var(--text-main) 8%, transparent),
          0 0 0 1px var(--shell-inner) inset;
      }

      .top-actions-sep {
        width: 1px;
        height: 26px;
        margin: 0 2px 0 6px;
        align-self: center;
        flex-shrink: 0;
        border-radius: 1px;
        background: var(--section-divider);
      }

      .top-actions-bar:has(#userBadge.hidden) .top-actions-sep {
        display: none;
      }

      .top-session-block {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 4px 0 2px;
        min-height: 38px;
      }

      .top-actions-bar:has(#userBadge.hidden) .top-session-block {
        display: none;
      }

      /* 仅展示：当前用户（非按钮，弱化边框与背景） */
      .user-display {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        max-width: min(220px, 42vw);
        min-height: 36px;
        padding: 2px 10px 2px 4px;
        border-radius: 10px;
        border: none;
        border-left: 3px solid color-mix(in srgb, var(--text-sub) 45%, transparent);
        background: color-mix(in srgb, var(--text-sub) 6%, transparent);
        color: var(--text-main);
        font-size: 13px;
        font-weight: 500;
        overflow: hidden;
        cursor: default;
        user-select: none;
      }

      .user-display-meta {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        gap: 1px;
        min-width: 0;
        flex: 1;
      }

      .user-display-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        width: 100%;
        max-width: 100%;
        line-height: 1.3;
        font-weight: 600;
        color: var(--text-main);
      }

      .user-display-role {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-sub);
        line-height: 1.2;
        white-space: nowrap;
      }

      .user-display-avatar {
        width: 28px;
        height: 28px;
        flex-shrink: 0;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 800;
        color: var(--text-sub);
        background: color-mix(in srgb, var(--text-sub) 14%, transparent);
        border: 1px solid color-mix(in srgb, var(--text-sub) 22%, transparent);
      }

      /* 可操作：退出登录（明确按钮态） */
      .top-logout-btn {
        height: 36px;
        padding: 0 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 650;
        white-space: nowrap;
        border: 1px solid color-mix(in srgb, var(--brand) 42%, transparent);
        background: linear-gradient(
          145deg,
          color-mix(in srgb, var(--brand) 16%, transparent),
          color-mix(in srgb, var(--brand-2) 11%, transparent)
        );
        color: var(--text-main);
        cursor: pointer;
        box-shadow: 0 2px 12px color-mix(in srgb, var(--brand) 14%, transparent);
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease,
          transform 0.08s ease,
          filter 0.2s ease;
      }

      .top-logout-btn:hover {
        border-color: color-mix(in srgb, var(--brand) 60%, transparent);
        filter: brightness(1.07);
        box-shadow: 0 4px 18px color-mix(in srgb, var(--brand) 22%, transparent);
      }

      .top-logout-btn:focus-visible {
        outline: 2px solid var(--field-focus);
        outline-offset: 2px;
      }

      .top-logout-btn:active {
        transform: scale(0.98);
      }

      /* 主题切换：可操作图标按钮（与展示区分） */
      .top-bar-icon-btn:focus-visible {
        outline: 2px solid var(--field-focus);
        outline-offset: 2px;
      }

      /* 主题确认对话框 */
      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 1100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
        background: color-mix(in srgb, #0a0c12 72%, transparent);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        opacity: 1;
        transition: opacity 0.2s ease;
      }

      body[data-theme="light"] .modal-overlay {
        background: color-mix(in srgb, #1d2534 35%, transparent);
      }

      .modal-overlay.hidden {
        display: none !important;
        pointer-events: none;
      }

      .modal-dialog {
        width: 100%;
        max-width: 400px;
        border-radius: 16px;
        border: 1px solid var(--stroke);
        background: var(--glass-strong);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        padding: 22px 22px 18px;
        box-shadow: var(--shadow-xl), 0 0 0 1px var(--shell-inner) inset;
      }

      .modal-title {
        margin: 0 0 10px;
        font-size: 17px;
        font-weight: 750;
        color: var(--text-main);
        letter-spacing: 0.02em;
      }

      .modal-desc {
        margin: 0 0 22px;
        font-size: 14px;
        line-height: 1.55;
        color: var(--text-sub);
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        flex-wrap: wrap;
      }

      .modal-btn {
        min-width: 88px;
        height: 40px;
        padding: 0 18px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 650;
        cursor: pointer;
        border: 1px solid transparent;
        transition:
          filter 0.18s ease,
          transform 0.08s ease,
          box-shadow 0.18s ease,
          border-color 0.18s ease;
      }

      .modal-btn:focus-visible {
        outline: 2px solid var(--field-focus);
        outline-offset: 2px;
      }

      .modal-btn:active {
        transform: scale(0.98);
      }

      .modal-btn-cancel {
        border-color: color-mix(in srgb, var(--text-sub) 35%, transparent);
        background: color-mix(in srgb, var(--text-sub) 8%, transparent);
        color: var(--text-main);
      }

      .modal-btn-cancel:hover {
        border-color: color-mix(in srgb, var(--text-sub) 50%, transparent);
        background: color-mix(in srgb, var(--text-sub) 14%, transparent);
      }

      .modal-btn-confirm {
        border-color: var(--button-border);
        background:
          linear-gradient(90deg, var(--button-overlay-1), var(--button-overlay-2)),
          linear-gradient(135deg, var(--brand) 0%, var(--brand-2) 100%);
        color: #fff;
        box-shadow: 0 6px 18px var(--button-shadow-1);
      }

      .modal-btn-confirm:hover {
        filter: brightness(1.06);
        box-shadow: 0 8px 22px var(--button-shadow-hover-1);
      }

      .modal-btn-danger {
        border-color: color-mix(in srgb, var(--error-text) 45%, transparent);
        background: linear-gradient(
          145deg,
          color-mix(in srgb, var(--error-text) 22%, transparent),
          color-mix(in srgb, var(--error-text) 12%, transparent)
        );
        color: var(--error-text);
        box-shadow: 0 4px 16px color-mix(in srgb, var(--error-text) 15%, transparent);
      }

      .modal-btn-danger:hover {
        filter: brightness(1.08);
        border-color: color-mix(in srgb, var(--error-text) 60%, transparent);
      }

      .hidden {
        display: none !important;
      }

      .auth-view {
        max-width: 460px;
        margin: 12px auto 4px;
        border-radius: 12px;
        background: transparent;
        border: none;
        box-shadow: none;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        padding: 20px 10px 14px;
      }

      .auth-title {
        margin: 0;
        font-size: 30px;
        line-height: 1.2;
        letter-spacing: 0.4px;
        font-weight: 780;
        color: var(--text-main);
        text-shadow: none;
      }

      .auth-sub {
        margin: 12px 0 0;
        color: var(--text-sub);
        font-size: 14px;
      }

      .auth-tip {
        margin: 10px 0 0;
        padding: 8px 10px;
        display: flex;
        align-items: center;
        gap: 6px;
        border-radius: 10px;
        border: 1px solid rgba(250, 204, 21, 0.22);
        background: rgba(250, 204, 21, 0.08);
        color: rgba(254, 240, 138, 0.88);
        font-size: 12px;
        line-height: 1.5;
      }

      .auth-tip-icon {
        width: 14px;
        height: 14px;
        flex: 0 0 14px;
        color: rgba(250, 204, 21, 0.78);
      }

      body[data-theme="light"] .auth-tip {
        border-color: rgba(202, 138, 4, 0.24);
        background: rgba(254, 240, 138, 0.22);
        color: rgba(146, 64, 14, 0.86);
      }

      body[data-theme="light"] .auth-tip-icon {
        color: rgba(202, 138, 4, 0.82);
      }

      .auth-grid {
        margin-top: 22px;
        display: grid;
        gap: 12px;
      }

      .auth-feedback {
        margin: 0;
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 14px;
        line-height: 1.5;
        text-align: center;
      }

      .auth-feedback.auth-feedback-success {
        background: var(--success-bg);
        color: var(--success-text);
        border: 1px solid color-mix(in srgb, var(--success-text) 28%, transparent);
      }

      .auth-feedback.auth-feedback-error {
        background: var(--error-bg);
        color: var(--error-text);
        border: 1px solid color-mix(in srgb, var(--error-text) 28%, transparent);
      }

      .field {
        height: 48px;
        display: flex;

      .task-item-main {

        min-width: 0;
        align-self: stretch;

      .task-status-badge {

      }

      .task-status-cancelled {
        opacity: 0.85;
      }

      .task-error-line {
        font-size: 12px;
        color: var(--error-text);
        margin-top: 6px;
        max-width: 100%;

      }

      .task-queue-meta {

        color: var(--text-sub);

      .task-progress-wrap {

        width: 100%;
        max-width: 100%;

      }

      .task-progress-bar-bg {

        border-radius: 999px;

      .task-row-actions {
        display: flex;

        gap: 8px;
        align-items: center;
        flex-shrink: 0;
      }

      .task-cancel-btn {
        font-size: 12px;
        font-weight: 650;
        padding: 8px 12px;
        border-radius: 9px;
        border: 1px solid color-mix(in srgb, var(--status-loading-text) 42%, transparent);
        background: linear-gradient(
          165deg,
          color-mix(in srgb, var(--status-loading-text) 18%, transparent),
          color-mix(in srgb, var(--brand) 10%, transparent)

      .task-cancel-btn:active {

      .task-delete-btn {

        font-weight: 600;

      .task-delete-btn:hover {

          165deg,
          color-mix(in srgb, var(--error-text) 14%, transparent),
          color-mix(in srgb, var(--error-text) 8%, transparent)

        color: var(--error-text);
        box-shadow: 0 4px 14px color-mix(in srgb, var(--error-text) 16%, transparent);
      }

      .task-delete-btn:active {
        transform: scale(0.98);
      }

      .task-retry-btn {
        font-size: 12px;
        font-weight: 650;
        padding: 8px 12px;
        border-radius: 9px;
        border: 1px solid color-mix(in srgb, var(--brand) 42%, transparent);

          165deg,
          color-mix(in srgb, var(--brand) 16%, transparent),

      .task-retry-btn:hover {

      .download-btn {

      .download-btn:active {

      .ghost-btn {

          transform 0.08s ease,
          filter 0.2s ease;

      .ghost-btn:hover {

        filter: brightness(1.05);
        box-shadow: 0 6px 20px color-mix(in srgb, var(--brand) 20%, transparent);
      }

      .ghost-btn:active {
        transform: scale(0.98);
      }

      /* 视觉简化版：除背景外，禁用渐变与阴影，按钮使用纯色体系 */
      .shell,
      .result-card,
      .history-item,
      .task-board,
      .task-board-toolbar,
      .task-board-pager,

      /* 主题按钮改为纯图标态，并增加 switch 动画 */
      #themeToggle {
        width: 32px;
        height: 32px;
        padding: 0;
        border: none !important;
        border-radius: 0 !important;
        background: transparent !important;
        background-color: transparent !important;

        align-items: center;
        justify-content: center;

      }

      #themeToggle:hover {
        background: transparent !important;
        border-color: transparent !important;
        color: #1f2937 !important;
      }

      #themeToggle svg {
        width: 20px;
        height: 20px;
      }

      #themeToggle.switching svg {
        animation: none;
      }

      body[data-theme="dark"] #themeToggle {
        color: #d1d5db !important;
      }

      @keyframes themeSwitchSpin {
        0% { transform: rotate(0deg) scale(1); opacity: 0.95; }
        50% { transform: rotate(110deg) scale(0.78); opacity: 0.3; }
        100% { transform: rotate(180deg) scale(1); opacity: 1; }

      .task-inline-btn.danger,
      .modal-btn-danger {

      /* 不要透明或白色按钮背景 */

      /* 任务列表区域全部去掉加粗 */

      /* 统一下拉框样式：接近 Ant 风格 */
      .filter-field select,

      /* 暗色主题优化：极简黑灰风（参考工作日志风格） */

      function formatSupportedFormatsLine(allowedTypes) {
        const types = new Set(
          (Array.isArray(allowedTypes) ? allowedTypes : [])
            .map((x) => String(x || "").trim().toLowerCase())
            .filter(Boolean)
            .map((x) => (x.startsWith(".") ? x.slice(1) : x))
        );
        const parts = [];
        if (types.has("pdf")) parts.push("PDF");
        if (types.has("doc") || types.has("docx")) parts.push("Word");
        if (types.has("ppt") || types.has("pptx")) parts.push("PPT");
        if (types.has("xls") || types.has("xlsx")) parts.push("Excel");
        if (types.has("html") || types.has("htm")) parts.push("网页");
        const imgExts = ["png", "jpg", "jpeg", "tif", "tiff", "bmp", "webp"];
        if (imgExts.some((x) => types.has(x))) parts.push("图片");
        if (!parts.length) {
          return "多格式文档智能转 Markdown";
        }
        return parts.join("、") + " 智能转 Markdown";
      }

      const TASK_PAGE_SIZES = [10, 20, 50];

      function normalizeTaskPageSize(value) {
        const n = Number(value);
        if (!Number.isFinite(n) || n <= 0) return TASK_PAGE_SIZES[0];
        let best = TASK_PAGE_SIZES[0];
        let bestDiff = Math.abs(n - best);
        for (let i = 1; i < TASK_PAGE_SIZES.length; i++) {
          const s = TASK_PAGE_SIZES[i];
          const diff = Math.abs(n - s);
          if (diff < bestDiff) {
            best = s;
            bestDiff = diff;
          }
        }
        return best;
      }

      function formatBytes(n) {
        const x = Number(n);
        if (!Number.isFinite(x) || x < 0) return "0 B";
        if (x < 1024) return x + " B";
        if (x < 1048576) return (x / 1024).toFixed(1) + " KB";
        return (x / 1048576).toFixed(1) + " MB";
      }

      /** 根据秒数格式化为中文剩余时间文案（用于上传 ETA） */
      function formatEtaSeconds(sec) {
        const s = Number(sec);
        if (!Number.isFinite(s) || s <= 0) return "";
        const ceil = Math.ceil(s);
        if (ceil < 60) return ceil + " 秒";
        if (ceil < 3600) {
          const m = Math.floor(ceil / 60);
          const rs = ceil % 60;
          if (rs === 0) return m + " 分钟";
          return m + " 分 " + rs + " 秒";
        }
        const h = Math.floor(ceil / 3600);
        const m = Math.floor((ceil % 3600) / 60);
        if (m === 0) return h + " 小时";
        return h + " 小时 " + m + " 分";
      }

      /**
       * 用已传字节与耗时估算剩余时间；起步阶段返回空串避免抖动。
       * @returns {string} 如 " · 剩余约 12 秒"，无可估算时 ""
       */
      function formatUploadEta(loaded, total, elapsedSec) {
        const L = Number(loaded);
        const T = Number(total);
        const elapsed = Number(elapsedSec);
        if (!Number.isFinite(L) || !Number.isFinite(T) || T <= 0 || L <= 0 || L >= T) {
          return "";
        }
        if (!Number.isFinite(elapsed) || elapsed < 0.45) {
          return "";
        }
        const speed = L / elapsed;
        if (speed < 200) {
          return "";
        }
        const etaSec = (T - L) / speed;
        if (!Number.isFinite(etaSec) || etaSec < 0.5) {
          return "";
        }
        if (etaSec > 48 * 3600) {
          return " · 剩余超过 48 小时";
        }
        return " · 剩余约 " + formatEtaSeconds(etaSec);
      }

      /** 将 FastAPI / HTTP JSON 里的 detail 转成可读字符串 */
      function formatApiDetail(payload) {
        if (!payload || payload.detail == null) return "";
        var d = payload.detail;
        if (typeof d === "string") return d;
        if (Array.isArray(d)) {
          return d
            .map(function (x) {
              if (x == null) return "";
              if (typeof x === "string") return x;
              if (typeof x.msg === "string") return x.msg;
              try {
                return JSON.stringify(x);
              } catch (e) {
                return "";
              }
            })
            .filter(Boolean)
            .join("；");
        }
        try {
          return JSON.stringify(d);
        } catch (e) {
          return String(d);
        }
      }

      /**
       * 主题化确认框（替代浏览器 confirm）。opts: title, message, confirmText, cancelText, danger
       * @returns {Promise<boolean>}
       */
      function openThemedConfirm(opts) {
        opts = opts || {};
        return new Promise(function (resolve) {
          if (!confirmModal || !confirmModalOk || !confirmModalCancel) {
            resolve(false);
            return;
          }
          var title = opts.title != null ? opts.title : "确认";
          var message = opts.message != null ? opts.message : "";
          var confirmText = opts.confirmText != null ? opts.confirmText : "确定";
          var cancelText = opts.cancelText != null ? opts.cancelText : "取消";
          var danger = !!opts.danger;
          var prevActive = document.activeElement;
          var settled = false;

          confirmModalTitle.textContent = title;
          confirmModalDesc.textContent = message;
          confirmModalOk.textContent = confirmText;
          confirmModalCancel.textContent = cancelText;

          confirmModalOk.classList.remove("modal-btn-confirm", "modal-btn-danger");
          if (danger) {
            confirmModalOk.classList.add("modal-btn-danger");
          } else {
            confirmModalOk.classList.add("modal-btn-confirm");
          }

          function finish(result) {
            if (settled) {
              return;
            }
            settled = true;
            document.removeEventListener("keydown", onDocKey);
            confirmModalOk.onclick = null;
            confirmModalCancel.onclick = null;
            confirmModal.onclick = null;
            confirmModal.classList.add("hidden");
            confirmModal.setAttribute("hidden", "");
            if (prevActive && typeof prevActive.focus === "function") {
              try {
                prevActive.focus();
              } catch (e) {
                /* ignore */
              }
            }
            resolve(result);
          }

          function onDocKey(e) {
            if (e.key === "Escape") {
              e.preventDefault();
              finish(false);
            }
          }

          confirmModalOk.onclick = function () {
            finish(true);
          };
          confirmModalCancel.onclick = function () {
            finish(false);
          };
          confirmModal.onclick = function (e) {
            if (e.target === confirmModal) {
              finish(false);
            }
          };

          document.addEventListener("keydown", onDocKey);
          confirmModal.classList.remove("hidden");
          confirmModal.removeAttribute("hidden");
          (danger ? confirmModalCancel : confirmModalOk).focus();
        });
      }

      function getFileRelativePath(file, mode) {
  if (!file) return "";
  if (mode === "folder") {
    return file.webkitRelativePath || file._relativePath || file.name || "";

}

function renderSelectedFiles() {
  if (!selectedListWrap || !selectedList) return;

  if (!currentFiles || !currentFiles.length) {
    selectedListWrap.classList.add("hidden");
    selectedList.innerHTML = "";
    return;
  }

  selectedListWrap.classList.remove("hidden");

  selectedList.innerHTML = currentFiles
    .map(function (file, index) {
      const rel = getFileRelativePath(file, currentUploadMode);
      const displayName = rel || file.name || ("文件 " + (index + 1));
      const sizeText = formatBytes(file && file.size ? file.size : 0);

      return (
        '<div class="selected-item">' +
          '<div class="selected-item-main">' +
            '<div class="selected-item-name">' +
              String(displayName).replace(/</g, "&lt;") +
            '</div>' +
            '<div class="selected-item-meta">' +
              sizeText +
            '</div>' +
          '</div>' +
          '<button type="button" class="selected-remove-btn" data-remove-index="' + index + '" aria-label="删除该条目" title="删除该条目">删除</button>' +
        '</div>'
      );
    })
    .join("");
}

function removeSelectedFileAt(index) {
  const i = Number(index);
  if (!Number.isInteger(i) || i < 0 || i >= currentFiles.length) {
    return;

  currentFiles.splice(i, 1);

  if (!currentFiles.length) {
    currentUploadMode = null;
    currentRootName = "";
    selectedFile.textContent = "";
    selectedFile.classList.add("hidden");
    selectedListWrap.classList.add("hidden");
    selectedList.innerHTML = "";

      fileInput.value = "";
      folderInput.value = "";
    } catch (e) {
      /* ignore */
    }
    updateConvertButtonState();
    return;
  }

  if (currentUploadMode === "folder") {
    const first = currentFiles[0];
    const rel = getFileRelativePath(first, "folder");
    const root = rel ? rel.split("/")[0] : "folder_upload";
    currentRootName = root;
    selectedFile.textContent =
      root + " · " + currentFiles.length + " 个文件";
  } else {
    currentRootName = currentFiles[0].name || "";
    if (currentFiles.length === 1) {
      selectedFile.textContent = currentFiles[0].name || "";
    } else {
      selectedFile.textContent = currentFiles.length + " 个文件";
    }
  }

  renderSelectedFiles();
  updateConvertButtonState();
}

      function statusLabel(status) {
        const map = {
          queued: "排队中",
          running: "转换中",
          succeeded: "已完成",
          failed: "失败",
          cancelled: "已取消",
        };
        return map[status] || status;
      }

      function formatTime(iso) {
        if (!iso) return "—";
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return iso;
        return d.toLocaleString("zh-CN", { hour12: false });
      }

      function parseIsoMs(iso) {
        if (!iso) return null;
        const d = new Date(iso);
        const t = d.getTime();
        return Number.isNaN(t) ? null : t;
      }

      /** 毫秒 → 中文耗时，如「45秒」「3分12秒」「1小时5分」 */
      function formatDurationZh(ms) {
        const n = Number(ms);
        if (!Number.isFinite(n) || n < 0) return "0秒";
        const sec = Math.floor(n / 1000);
        if (sec < 60) return sec + "秒";
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        if (m < 60) {
          return s === 0 ? m + "分钟" : m + "分" + s + "秒";
        }
        const h = Math.floor(m / 60);
        const rm = m % 60;
        if (rm === 0) return h + "小时";
        return h + "小时" + rm + "分";
      }

      /** 已完成任务：总耗时（提交→结束）+ 若有开始时间则附加处理耗时 */
      function totalDurationMetaLine(job) {
        const term = { succeeded: 1, failed: 1, cancelled: 1 };
        if (!term[job.status] || !job.finished_at || !job.created_at) return "";
        const c = parseIsoMs(job.created_at);
        const f = parseIsoMs(job.finished_at);
        if (c == null || f == null || f < c) return "";
        let out = " · 总耗时 " + formatDurationZh(f - c);
        const st = parseIsoMs(job.started_at);
        if (st != null && f >= st) {
          out += " · 处理 " + formatDurationZh(f - st);
        }
        return out;
      }

      function escapeAttr(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;");
      }

      function updateLiveElapsedSpans() {
        document.querySelectorAll(".task-live-elapsed").forEach(function (el) {
          const c = el.getAttribute("data-created-at");
          const s = el.getAttribute("data-started-at");
          const st = el.getAttribute("data-st");
          const pctStr = el.getAttribute("data-progress-percent");
          const t0 = parseIsoMs(c);
          if (t0 == null) {
            el.textContent = "";
            return;
          }
          const now = Date.now();
          let txt = "耗时 " + formatDurationZh(now - t0);
          const t1 = parseIsoMs(s);
          if (t1 != null && st === "running") {
            const processingMs = now - t1;
            txt += " · 处理 " + formatDurationZh(processingMs);

            const pct = parseFloat(pctStr);
            if (Number.isFinite(pct) && pct > 1 && pct < 100) {
              const estimatedTotal = processingMs / (pct / 100);
              const remaining = estimatedTotal - processingMs;
              if (remaining > 1000) {
                txt += " · 预计剩余 " + formatDurationZh(remaining);
              }
            }
          }
          el.textContent = txt;
        });
      }

      function ensureLiveElapsedTicker(items) {
        const hasActive = (items || []).some(function (j) {
          return j.status === "queued" || j.status === "running";
        });
        if (hasActive) {
          updateLiveElapsedSpans();
          if (!liveElapsedInterval) {
            liveElapsedInterval = setInterval(updateLiveElapsedSpans, 1000);
          }
        } else if (liveElapsedInterval) {
          clearInterval(liveElapsedInterval);
          liveElapsedInterval = null;
        }
      }

            headers: mergeAuthHeaders({}),

          if (!resp.ok) return;
          const data = await resp.json();
          const names = data.usernames || [];
          const prev = taskOwnerFilter.value;
          taskOwnerFilter.innerHTML =
            '<option value="">全部用户</option>' +

              .map((u) => '<option value="' + u.replace(/"/g, "&quot;") + '">' + u + "</option>")

            taskOwnerFilter.value = prev;
          }
        } catch (e) {
          /* ignore */
        }
      }

      function syncTaskPager() {
        if (taskPageSizeSelect) {
          const raw = Number(taskPageSizeSelect.value);
          if (Number.isFinite(raw) && raw > 0) {
            taskPageSize = normalizeTaskPageSize(raw);
          }
          taskPageSizeSelect.value = String(taskPageSize);
        }
        let taskPage = getCurrentTaskPage();
        taskTotal = Math.max(0, Math.floor(Number(taskTotal) || 0));
        const totalPages = taskPageSize > 0 ? Math.max(1, Math.ceil(taskTotal / taskPageSize)) : 1;
        if (taskPage > totalPages) taskPage = totalPages;
        setCurrentTaskPage(taskPage);
        if (taskPrevBtn) taskPrevBtn.disabled = taskPage <= 1;
        if (taskNextBtn) taskNextBtn.disabled = taskPage >= totalPages;
        if (taskPageLabel) taskPageLabel.textContent = "第 " + taskPage + " / " + totalPages + " 页";
        if (taskJumpInput) taskJumpInput.value = "";
        if (taskPageNumbers) {
          const pages = [];
          const pushPage = (p) => pages.push({ t: String(p), p });
          const pushDots = () => pages.push({ t: "…", p: null });
          if (totalPages <= 7) {
            for (let i = 1; i <= totalPages; i++) pushPage(i);
          } else {
            pushPage(1);
            if (taskPage > 4) pushDots();
            const start = Math.max(2, taskPage - 1);
            const end = Math.min(totalPages - 1, taskPage + 1);
            for (let i = start; i <= end; i++) pushPage(i);
            if (taskPage < totalPages - 3) pushDots();
            pushPage(totalPages);
          }
          taskPageNumbers.innerHTML = pages
            .map((x) => {
              if (x.p == null) return '<span class="task-page-dots">…</span>';
              const active = x.p === taskPage ? " active" : "";
              return (
                '<button type="button" class="task-page-btn' +
                active +
                '" data-task-page="' +
                x.p +
                '">' +
                x.t +
                "</button>"
              );
            })
            .join("");
        }
      }

      async function refreshTaskList(opts) {
        opts = opts || {};
        if (!currentUser) {
          historyWrap.classList.remove("show");
          historyList.innerHTML = "";
          return;
        }
        const requestSeq = ++taskListRequestSeq;
        if (taskListAbortController) {
          try {
            taskListAbortController.abort();
          } catch (e) {
            /* ignore */
          }
        }
        taskListAbortController = new AbortController();
        if (opts.page_size != null) {
          const ps = Number(opts.page_size);
          if (Number.isFinite(ps) && ps > 0) {
            taskPageSize = normalizeTaskPageSize(ps);
          }
        }
        if (opts.page != null) {
          const p = Number(opts.page);
          if (Number.isFinite(p) && p > 0) {
            setCurrentTaskPage(Math.max(1, Math.floor(p)));
          }
        }
        if (opts.resetPage) {
          setCurrentTaskPage(1);
        }
        syncTaskPager();
        if (!opts.silent) {
          historyWrap.classList.add("show");
          historyList.innerHTML =
            '<p class="history-meta" style="margin:0;color:var(--text-sub)">加载任务列表…</p>';
        }
        try {
          const params = new URLSearchParams();
          params.set("page", String(getCurrentTaskPage()));
          params.set("page_size", String(taskPageSize));
          if (taskSearchQuery) {
            params.set("q", taskSearchQuery);
          }
          if (currentUser.role === "admin") {
            if (taskOwnerFilter.value) params.set("owner", taskOwnerFilter.value);
          }
          const activeStatusValue = getActiveTaskStatusQueryValue();
          if (activeStatusValue) params.set("status", activeStatusValue);
          const resp = await fetch("/jobs?" + params.toString(), {
            credentials: "same-origin",
            cache: "no-store",
            signal: taskListAbortController.signal,
          });
          if (requestSeq !== taskListRequestSeq) return;
          if (resp.status === 401) {
            setAuthState(null);
            return;
          }
          const data = await resp.json();
          if (requestSeq !== taskListRequestSeq) return;
          if (!resp.ok) {
            if (!opts.silent) showToast("error", data.detail || "加载任务失败");
            if (!opts.silent) {
              historyWrap.classList.add("show");
              historyList.innerHTML =
                '<p class="history-meta" style="margin:0">加载失败，请稍后点击「刷新」重试。</p>';
            }
            return;
          }
          renderTaskItems(data.items || []);
          updateTaskPollingFromItems(data.items || []);
          setCurrentTaskPage(Number(data.page) || getCurrentTaskPage());
          taskPageSize = normalizeTaskPageSize(data.page_size);
          taskTotal = Number(data.total) || 0;
          updateTaskSectionHeader();
          syncTaskPager();
        } catch (e) {
          if (e && e.name === "AbortError") return;
          if (requestSeq !== taskListRequestSeq) return;
          if (!opts.silent) showToast("error", "加载任务列表失败");
          if (!opts.silent) {
            historyWrap.classList.add("show");
            historyList.innerHTML =
              '<p class="history-meta" style="margin:0">加载失败，请稍后点击「刷新」重试。</p>';
          }
        }
      }

      async function pollJobUntilTerminal(jobId, generation) {
        const terminal = { succeeded: 1, failed: 1, cancelled: 1 };
        // 任务进度在任务列表中展示；此处仅轮询以在完成后更新结果区与 Toast。

        while (true) {
          if (generation !== uploadGeneration) {
            return;
          }
          try {
            await refreshTaskList({ silent: true });
            if (generation !== uploadGeneration) {
              return;
            }
            const resp = await fetch("/jobs/" + encodeURIComponent(jobId), {
              credentials: "same-origin",
              cache: "no-store",
              headers: mergeAuthHeaders({}),
            });
            if (resp.status === 401) {
              setAuthState(null);
              return;
            }
            const job = await resp.json();
            if (!resp.ok) {
              if (resp.status === 404) {
                await refreshTaskList();
                if (generation === uploadGeneration) {
                  showToast("success", "该任务记录已不存在");
                }
                break;
              }
              if (generation === uploadGeneration) {
                setStatus("error", job.detail || "无法获取任务状态");
              }
              break;
            }
            if (terminal[job.status]) {
              if (generation !== uploadGeneration) {
                return;
              }
              if (job.status === "succeeded") {
    let msg = "转换完成";
    const c = parseIsoMs(job.created_at);
    const f = parseIsoMs(job.finished_at);
    if (c != null && f != null && f >= c) {
      msg += "，总耗时 " + formatDurationZh(f - c);
    }

    if (Array.isArray(job.pdf_vl_failed_pages) && job.pdf_vl_failed_pages.length) {
      msg += "（部分页未成功：第 " + job.pdf_vl_failed_pages.join("、") + " 页）";
    }

    setStatus("success", msg);
    resultFilename.textContent = job.original_filename || "";
    downloadBtn.href = job.download_url || "#";
    result.classList.add("show");
    progressWrap.classList.remove("show");
    resetProgressBar();
  }
 else if (job.status === "failed") {
                setStatus("error", job.error_message || "转换失败");
                progressWrap.classList.remove("show");
                resetProgressBar();
              } else if (job.status === "cancelled") {
                setStatus("success", "任务已取消");
                progressWrap.classList.remove("show");
                resetProgressBar();
              }

              await refreshTaskList();
              try {
                fileInput.value = "";
              } catch (e) {
                /* ignore */
              }
              break;
            }
          } catch (e) {
            if (generation === uploadGeneration) {
              setStatus("error", "轮询任务状态失败");
            }
            break;
          }
          await new Promise(function (r) {
            setTimeout(r, 1000);
          });
        }
      }

      async function readAllDirectoryEntries(dirReader) {
    const entries = [];
    while (true) {
      const batch = await new Promise((resolve, reject) => {
        dirReader.readEntries(resolve, reject);
      });
      if (!batch || !batch.length) {
        break;
      }
      entries.push(...batch);
    }
    return entries;
  }

  async function walkEntry(entry, pathPrefix) {
    if (!entry) return [];

    if (entry.isFile) {
      const file = await new Promise((resolve, reject) => {
        entry.file(resolve, reject);
      });

      const relPath = pathPrefix ? (pathPrefix + "/" + file.name) : file.name;

      try {
        Object.defineProperty(file, "webkitRelativePath", {
          value: relPath,
          configurable: true,
        });
      } catch (e) {
        file._relativePath = relPath;
      }

      if (!file._relativePath) {
        file._relativePath = relPath;
      }

      return [file];
    }

    if (entry.isDirectory) {
      const dirPath = pathPrefix ? (pathPrefix + "/" + entry.name) : entry.name;
      const reader = entry.createReader();
      const children = await readAllDirectoryEntries(reader);

      let files = [];
      for (const child of children) {
        const subFiles = await walkEntry(child, dirPath);
        files = files.concat(subFiles);
      }
      return files;
    }

    return [];
  }

async function extractDroppedFiles(dataTransfer) {
  if (!dataTransfer) {
    return { mode: "file", files: [] };
  }

  const items = Array.from(dataTransfer.items || []);
  const hasEntryApi = items.some(
    (item) => item && typeof item.webkitGetAsEntry === "function"
  );

  if (!hasEntryApi) {
    return {
      mode: "file",
      files: Array.from(dataTransfer.files || []),
    };
  }

  let allFiles = [];
  let hasDirectory = false;

  for (const item of items) {
    if (!item || item.kind !== "file") continue;

    const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
    if (!entry) continue;

    if (entry.isDirectory) {
      hasDirectory = true;
    }

    const files = await walkEntry(entry, "");
    allFiles = allFiles.concat(files);
  }

  return {
    mode: hasDirectory ? "folder" : "file",
    files: allFiles,
  };
}

      window.addEventListener("dragleave", (event) => {
        event.preventDefault();
        windowDragDepth = Math.max(0, windowDragDepth - 1);
        if (windowDragDepth === 0) {
          document.body.classList.remove("window-dragging");
        }
      });

      window.addEventListener("drop", (event) => {
        event.preventDefault();

      function postJobsWithUploadProgress(formData, myGen, totalBytes) {
        const progressText = progressWrap.querySelector(".progress-text");
        return new Promise(function (resolve, reject) {
          const xhr = new XMLHttpRequest();
          xhr.open("POST", "/jobs");
          xhr.withCredentials = true;
          const ah = authHeaderObject();
          if (ah.Authorization) {
            xhr.setRequestHeader("Authorization", ah.Authorization);
          }
          uploadXhr = xhr;
          let uploadT0 = 0;
          xhr.upload.addEventListener("progress", function (e) {
            if (myGen !== uploadGeneration) {
              return;
            }
            const fileSize = typeof totalBytes === "number"
              ? totalBytes
              : (currentFiles || []).reduce(function (sum, f) {
  return sum + (f && f.size ? f.size : 0);
}, 0);

            const total =
              e.lengthComputable && e.total > 0 ? e.total : fileSize > 0 ? fileSize : 0;
            const elapsedSec = uploadT0 > 0 ? (performance.now() - uploadT0) / 1000 : 0;
            if (total > 0 && progressFill) {
              progressWrap.classList.add("progress-upload");
              const pct = Math.min(100, Math.round((e.loaded / total) * 100));
              progressFill.style.width = pct + "%";
              if (progressTrack) {
                progressTrack.setAttribute("aria-valuenow", String(pct));
              }
              const eta = formatUploadEta(e.loaded, total, elapsedSec);
              progressText.textContent =
                "上传中 " +
                pct +
                "%（" +
                formatBytes(e.loaded) +
                " / " +
                formatBytes(total) +
                "）" +
                eta;
            } else {
              progressWrap.classList.remove("progress-upload");
              if (progressFill) progressFill.style.width = "0%";
              if (progressTrack) progressTrack.setAttribute("aria-valuenow", "0");
              progressText.textContent = "上传中… " + formatBytes(e.loaded);
            }
          });
          xhr.onload = function () {
            if (uploadXhr === xhr) uploadXhr = null;
            if (myGen !== uploadGeneration) {
              return;
            }
            let payload = null;
            try {
              payload = xhr.responseText ? JSON.parse(xhr.responseText) : null;
            } catch (err) {
              payload = { detail: xhr.responseText || "响应解析失败" };
            }
            resolve({ ok: xhr.status >= 200 && xhr.status < 300, status: xhr.status, payload: payload });
          };
          xhr.onerror = function () {
            if (uploadXhr === xhr) uploadXhr = null;
            if (myGen !== uploadGeneration) {
              return;
            }
            reject(new Error("network"));
          };
          xhr.onabort = function () {
            if (uploadXhr === xhr) uploadXhr = null;
            if (myGen !== uploadGeneration) {
              return;
            }
            reject(new Error("aborted"));
          };
          uploadT0 = performance.now();
          xhr.send(formData);
        });
      }

      async function uploadAndConvert() {
        resetResult();
        resetProgressBar();
        progressWrap.classList.remove("show");
        statusBox.className = "status-box";
        statusBox.textContent = "";
        if (!currentFiles || !currentFiles.length) {
  setStatus("error", "请先选择要上传的文件或文件夹");
  return;
}

        const myGen = ++uploadGeneration;
        const oldText = convertBtn.textContent;
        convertBtn.disabled = true;
        convertBtn.textContent = "提交中...";
        const progressText = progressWrap.querySelector(".progress-text");
        try {
          progressWrap.classList.add("show");
          progressWrap.classList.add("progress-upload");
          if (progressFill) progressFill.style.width = "0%";
          if (progressTrack) progressTrack.setAttribute("aria-valuenow", "0");
          progressText.textContent = "开始上传…";
          if (uploadCancelBtn) {
            uploadCancelBtn.hidden = false;
            uploadCancelBtn.disabled = false;
          }

          const jobIds = [];
          const failedUploads = [];

          if (currentUploadMode === "folder") {
            for (let i = 0; i < currentFiles.length; i++) {
              if (myGen !== uploadGeneration) {
                return;
              }
              const f = currentFiles[i];
              const rel = f.webkitRelativePath || f._relativePath || f.name;
              const namedFile = new File([f], rel, {
                type: f.type,
                lastModified: f.lastModified,
              });

              progressText.textContent =
                "开始上传（" + (i + 1) + "/" + currentFiles.length + "）…";
              if (progressFill) progressFill.style.width = "0%";
              if (progressTrack) progressTrack.setAttribute("aria-valuenow", "0");

              const formData = new FormData();
              formData.append("files", namedFile);
              formData.append("relative_paths", rel);
              formData.append("upload_kind", "file");
              formData.append("root_name", "");

              const { ok, status, payload } = await postJobsWithUploadProgress(
                formData,
                myGen,
                f.size || 0
              );
              if (status === 401) {
                setAuthState(null);
                setStatus("error", "登录已失效，请重新登录");
                resetProgressBar();
                progressWrap.classList.remove("show");
                return;
              }
              if (!ok) {
                console.error("create job failed:", status, payload);
                failedUploads.push({
                  name: rel,
                  detail: (payload && payload.detail) || ("创建任务失败，HTTP " + status),
                });
                continue;
              }
              const jobId = payload && payload.job_id;
              if (jobId) {
                jobIds.push(jobId);
              } else {
                failedUploads.push({ name: rel, detail: "未返回任务 ID" });
              }
            }
          } else if (currentFiles.length === 1) {
            const f = currentFiles[0];
            const formData = new FormData();
            formData.append("files", f);
            formData.append("relative_paths", f.name);
            formData.append("upload_kind", "file");
            formData.append("root_name", "");

            const { ok, status, payload } = await postJobsWithUploadProgress(formData, myGen, f.size || 0);
            if (status === 401) {
              setAuthState(null);
              setStatus("error", "登录已失效，请重新登录");
              resetProgressBar();
              progressWrap.classList.remove("show");
              return;
            }
            if (!ok) {
              console.error("create job failed:", status, payload);
              setStatus("error", (payload && payload.detail) || ("创建任务失败，HTTP " + status));
              resetProgressBar();
              progressWrap.classList.remove("show");
              return;
            }
            const jobId = payload && payload.job_id;
            if (jobId) {
              jobIds.push(jobId);
            } else {
              setStatus("error", "未返回任务 ID");
              resetProgressBar();
              progressWrap.classList.remove("show");
              return;
            }
          } else {
            for (let i = 0; i < currentFiles.length; i++) {
              if (myGen !== uploadGeneration) {
                return;
              }
              const f = currentFiles[i];
              progressText.textContent =
                "开始上传（" + (i + 1) + "/" + currentFiles.length + "）…";
              if (progressFill) progressFill.style.width = "0%";
              if (progressTrack) progressTrack.setAttribute("aria-valuenow", "0");

              const formData = new FormData();
              formData.append("files", f);
              formData.append("relative_paths", f.name);
              formData.append("upload_kind", "file");
              formData.append("root_name", "");

              const { ok, status, payload } = await postJobsWithUploadProgress(formData, myGen, f.size || 0);
              if (status === 401) {
                setAuthState(null);
                setStatus("error", "登录已失效，请重新登录");
                resetProgressBar();
                progressWrap.classList.remove("show");
                return;
              }
              if (!ok) {
                console.error("create job failed:", status, payload);
                failedUploads.push({
                  name: f.name,
                  detail: (payload && payload.detail) || ("创建任务失败，HTTP " + status),
                });
                continue;
              }
              const jobId = payload && payload.job_id;
              if (jobId) {
                jobIds.push(jobId);
              } else {
                failedUploads.push({ name: f.name, detail: "未返回任务 ID" });
              }
            }
          }

          if (myGen !== uploadGeneration) {
            return;
          }
          // 上传请求已经结束：进入任务创建/轮询阶段，不再需要「取消上传」按钮。
          if (uploadCancelBtn) {
            uploadCancelBtn.hidden = true;
            uploadCancelBtn.disabled = false;
          }
          resetProgressBar();
          progressWrap.classList.remove("show");

        await refreshTaskList();
        clearCurrentSelection();

          if (jobIds.length) {
            setStatus("success", "任务已创建，正在后台处理");
            for (const jobId of jobIds) {
              pollJobUntilTerminal(jobId, myGen);
            }
          } else {
            setStatus("error", "未创建任何任务");
            resetProgressBar();
            progressWrap.classList.remove("show");
            return;
          }

          if (!failedUploads.length) {
            showToast("success", "已提交 " + jobIds.length + " 个任务");
          } else if (jobIds.length) {
            showToast("warn", "已提交 " + jobIds.length + " 个任务，失败 " + failedUploads.length + " 个");
          } else {
            showToast("error", "上传失败 " + failedUploads.length + " 个文件");
          }

        } catch (error) {
          if (myGen === uploadGeneration) {
            const message = String((error && error.message) || "");
            if (message === "aborted") {
              setStatus("success", "已取消上传");
              resetProgressBar();
              progressWrap.classList.remove("show");
            } else {
              console.error("upload failed:", error);
setStatus("error", "请求失败：" + (error && error.message ? error.message : "未知错误"));

              resetProgressBar();
              progressWrap.classList.remove("show");
            }
          }
        } finally {
          convertBtn.textContent = oldText;
          if (uploadCancelBtn) {
            uploadCancelBtn.hidden = true;
            uploadCancelBtn.disabled = false;
          }
          updateConvertButtonState();
        }
      }

      convertBtn.addEventListener("click", uploadAndConvert);
      if (uploadCancelBtn) {
        uploadCancelBtn.addEventListener("click", async () => {
          if (!uploadXhr) return;
          const okCancel = await openThemedConfirm({
            title: "取消上传",
            message: "确定取消当前上传吗？取消后不会创建转换任务。",

          });
          if (!okCancel) return;
          if (uploadCancelBtn) uploadCancelBtn.disabled = true;

            uploadXhr.abort();

        });
      }
      initProductTagline();

      (async function initAuth() {
        try {
          const hadStoredToken = !!getStoredAccessToken();
          const resp = await fetch("/auth/bootstrap", {
            credentials: "same-origin",
            cache: "no-store",
            headers: mergeAuthHeaders({}),
          });
          let payload = null;
          if (resp.ok) {
            payload = await resp.json();
          }
          if (sessionBoot) sessionBoot.classList.add("hidden");
          if (!resp.ok) {
            setAuthState(null);
            if (resp.status === 401 && hadStoredToken) {
              showToast("error", "登录已过期或凭证无效，请重新登录");
            }
            return;
          }
          setAuthState(
            { username: payload.username, role: payload.role },
            { initialJobs: payload.jobs }
          );
        } catch (error) {
          if (sessionBoot) sessionBoot.classList.add("hidden");
          setAuthState(null);
          if (hadStoredToken) {
            showToast("error", "无法验证登录状态，请检查网络后刷新页面");
          }
        }
      })();
