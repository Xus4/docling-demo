<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智枢文档</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body data-theme="dark">
    <div id="toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <span class="toast-icon" aria-hidden="true"></span>
      <span class="toast-message"></span>
    </div>

    <main class="page">
      <header class="brand">
        <div class="brand-inner">
          <h1>智枢文档</h1>
          <p class="brand-slogan">智能文档中枢 · 结构化知识引擎</p>
          <p id="productTagline" class="product-tagline">多格式文档智能转 Markdown</p>
        </div>
      </header>

      <div class="top-actions">
        <div class="top-actions-bar" role="toolbar" aria-label="顶部工具栏">
          <button
            id="themeToggle"
            class="top-bar-icon-btn"
            type="button"
            aria-label="切换主题"
            title="切换主题"
          ></button>
          <div class="top-actions-sep" aria-hidden="true"></div>
          <div class="top-session-block">
            <div
              id="userBadge"
              class="user-display hidden"
              role="status"
              aria-live="polite"
              aria-label="当前登录用户"
            ></div>
            <button id="logoutBtn" class="top-logout-btn hidden" type="button">退出登录</button>
          </div>
        </div>
      </div>

      <section id="mainShell" class="shell login-shell">
        <div id="sessionBoot" class="session-boot" role="status" aria-live="polite">
          <div class="session-boot-spinner" aria-hidden="true"></div>
          <p class="session-boot-text">正在验证登录状态…</p>
        </div>
        <section id="authBox" class="auth-view hidden">
          <h2 class="auth-title">账号登录</h2>

          <div class="auth-grid">
            <label class="field">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 12C14.4853 12 16.5 9.98528 16.5 7.5C16.5 5.01472 14.4853 3 12 3C9.51472 3 7.5 5.01472 7.5 7.5C7.5 9.98528 9.51472 12 12 12Z" stroke="currentColor" stroke-width="1.7"></path>
                <path d="M4 20.25C4.7 16.9 7.8 14.5 12 14.5C16.2 14.5 19.3 16.9 20 20.25" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"></path>
              </svg>
              <input id="usernameInput" type="text" placeholder="账号" autocomplete="username" />
            </label>
            <label class="field with-action password-field">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M7.5 10V7.75C7.5 5.12665 9.62665 3 12.25 3C14.8734 3 17 5.12665 17 7.75V10" stroke="currentColor" stroke-width="1.7"></path>
                <rect x="5" y="10" width="14" height="11" rx="2.5" stroke="currentColor" stroke-width="1.7"></rect>
                <circle cx="12" cy="15.5" r="1.2" fill="currentColor"></circle>
              </svg>
              <input id="passwordInput" type="password" placeholder="密码" autocomplete="current-password" />
              <button id="passwordToggle" class="field-action" type="button" aria-label="显示密码" title="显示密码">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M2.7 12.02C4.5 8.6 7.82 6.5 12 6.5C16.18 6.5 19.5 8.6 21.3 12.02C19.5 15.4 16.18 17.5 12 17.5C7.82 17.5 4.5 15.4 2.7 12.02Z" stroke="currentColor" stroke-width="1.7"></path>
                  <circle cx="12" cy="12" r="2.6" stroke="currentColor" stroke-width="1.7"></circle>
                </svg>
              </button>
            </label>
            <div class="auth-meta">
              <label class="remember-wrap" for="rememberMe">
                <input id="rememberMe" type="checkbox" />
                <span>记住我</span>
              </label>
              <a id="forgotPasswordLink" class="forgot-link" href="#" role="button">忘记密码？</a>
            </div>
            <button id="loginBtn" class="primary-btn" type="button">登录</button>
            <p
              id="authFeedback"
              class="auth-feedback hidden"
              role="status"
              aria-live="polite"
              aria-atomic="true"
            ></p>
          </div>
          <p class="auth-tip">
            <svg class="auth-tip-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 2.75L21.25 19.25C21.57 19.82 21.16 20.5 20.5 20.5H3.5C2.84 20.5 2.43 19.82 2.75 19.25L12 2.75Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"></path>
              <path d="M12 8.5V13.2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"></path>
              <circle cx="12" cy="16.9" r="1.1" fill="currentColor"></circle>
            </svg>
            <span>已支持云脑账号，请使用云脑账号登录</span>
          </p>
        </section>

        <section id="workArea" class="workspace hidden">
          <input id="fileInput" type="file" multiple hidden />
          <input id="folderInput" type="file" webkitdirectory multiple hidden />
          <div
            id="dropzone"
            class="dropzone"
            role="region"
            aria-label="拖拽上传：将文件或文件夹拖入此区域"
          >
            <div class="dropzone-lead">
              <p class="dropzone-text">
                <span class="dropzone-text-primary">拖拽文件或文件夹到此处</span><span class="dropzone-text-secondary">，松开即可添加</span>
              </p>
            </div>
            <div class="dropzone-picks">
              <button
                type="button"
                class="dropzone-pick dropzone-pick-file"
                id="pickFileBtn"
                aria-label="选择文件，本地文件可多选"
              >
                <svg class="pick-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path
                    d="M14 3H8C6.34315 3 5 4.34315 5 6V18C5 19.6569 6.34315 21 8 21H16C17.6569 21 19 19.6569 19 18V9L14 3Z"
                    stroke="currentColor"
                    stroke-width="1.65"
                    stroke-linejoin="round"
                  ></path>
                  <path d="M14 3V9H19" stroke="currentColor" stroke-width="1.65" stroke-linejoin="round"></path>
                  <path d="M8 13H16M8 17H13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
                </svg>
                <span class="dropzone-pick-sub">上传本地文件，可多选</span>
              </button>
              <button
                type="button"
                class="dropzone-pick dropzone-pick-folder"
                id="pickFolderBtn"
                aria-label="上传文件夹，批量添加其中文件"
              >
                <svg class="pick-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path
                    d="M4 8.5C4 7.11929 5.11929 6 6.5 6H9.17157C9.70201 6 10.2107 6.21071 10.5858 6.58579L12 8H19C20.1046 8 21 8.89543 21 10V17.5C21 18.8807 19.8807 20 18.5 20H6.5C5.11929 20 4 18.8807 4 17.5V8.5Z"
                    stroke="currentColor"
                    stroke-width="1.65"
                    stroke-linejoin="round"
                  ></path>
                  <path d="M4 10H21" stroke="currentColor" stroke-width="1.65" stroke-linecap="round"></path>
                </svg>
                <span class="dropzone-pick-sub">选中文件夹批量添加</span>
              </button>
            </div>
          </div>

          <div class="upload-flow">
            <div id="selectedFile" class="selected-file hidden"></div>
            <div id="selectedListWrap" class="selected-list-wrap hidden">
              <p class="selected-list-title">已选条目</p>
              <div id="selectedList" class="history-list"></div>
            </div>
            <div class="filter-field upload-mode-field" style="max-width: 320px">
              <label for="mineruBackendSelect" class="upload-mode-label">选择解析模式</label>
              <select id="mineruBackendSelect" aria-label="选择 MinerU 解析后端">
                <option value="pipeline">快速解析</option>
                <option value="vlm-auto-engine">高精度解析（本地）</option>
                <option value="vlm-http-client">高精度解析（API）</option>
                <option value="hybrid-auto-engine" selected>混合高精度解析（本地）</option>
                <option value="hybrid-http-client">混合高精度解析（API）</option>
              </select>
            </div>
            <button id="convertBtn" class="primary-btn" type="button" disabled>上传并转换</button>
          </div>

          <div id="progressWrap" class="progress-wrap" aria-live="polite">
            <p class="progress-text">文档解析中，请稍候...</p>
            <p id="progressElapsedLine" class="progress-elapsed-line" hidden></p>
            <div id="progressTrack" class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
              <div id="progressFill" class="progress-fill" style="width: 0%"></div>
              <div class="progress-bar progress-bar-indeterminate"></div>
            </div>
            <div class="upload-actions">
              <button id="uploadCancelBtn" type="button" class="task-cancel-btn" hidden>取消上传</button>
            </div>
          </div>

          <div id="statusBox" class="status-box" aria-live="polite"></div>

          <div id="result" class="result">
            <p class="section-title">转换结果</p>
            <div class="result-card">
              <span id="resultFilename" class="filename"></span>
              <a id="downloadBtn" class="download-btn" href="#" target="_blank" rel="noopener">下载结果（ZIP）</a>
            </div>
          </div>

          <div id="history" class="history">
            <div class="task-board">
              <div class="task-board-toolbar">
                <div class="task-toolbar-stack">
                  <div class="task-toolbar-row">
                    <div class="task-toolbar-left">
                      <div class="task-search-shell">
                        <svg class="task-search-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                          <path d="M10.5 18.5C14.6421 18.5 18 15.1421 18 11C18 6.85786 14.6421 3.5 10.5 3.5C6.35786 3.5 3 6.85786 3 11C3 15.1421 6.35786 18.5 10.5 18.5Z" stroke="currentColor" stroke-width="1.8"></path>
                          <path d="M16.3 16.3L21 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                        </svg>
                        <input
                          id="taskSearchInput"
                          class="task-search-input"
                          type="search"
                          placeholder="搜索文件名..."
                          aria-label="按文件名搜索任务"
                          autocomplete="off"
                        />
                      </div>
                      <div id="taskFilters" class="task-filters hidden">
                        <label id="taskOwnerFilterField" class="filter-field">
                          <span>用户</span>
                          <select id="taskOwnerFilter" aria-label="按用户筛选"></select>
                        </label>
                      </div>
                      <div id="taskStatusTabs" class="task-status-tabs" aria-label="按任务状态快捷筛选">
                        <button type="button" class="task-status-tab is-active" data-task-status="all" data-status="all">全部</button>
                        <button type="button" class="task-status-tab" data-task-status="running" data-status="running">处理中</button>
                        <button type="button" class="task-status-tab" data-task-status="queued" data-status="queued">排队中</button>
                        <button type="button" class="task-status-tab" data-task-status="succeeded" data-status="succeeded">已完成</button>
                        <button type="button" class="task-status-tab" data-task-status="failed" data-status="failed">失败</button>
                        <button type="button" class="task-status-tab" data-task-status="cancelled" data-status="cancelled">已取消</button>
                      </div>
                    </div>
                    <div class="task-toolbar-right">
                      <button id="refreshTasksBtn" class="task-muted-btn" type="button">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                          <path d="M20 12A8 8 0 1 1 17.66 6.34" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                          <path d="M20 4V10H14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                        <span>刷新</span>
                      </button>
                      <button id="resetTaskFiltersBtn" type="button" class="task-muted-btn">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                          <path d="M21 12A9 9 0 1 1 18.4 5.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                          <path d="M21 4V10H15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                        <span>重置</span>
                      </button>
                    </div>
                  </div>

                </div>
              </div>

              <div id="taskSectionHead" class="task-section-head" aria-label="当前任务分区">
                <div class="task-section-meta">
                  <p id="taskSectionTitle" class="task-section-title">全部任务：0条</p>
                </div>
                <div id="taskCompletedActions" class="task-completed-actions hidden" aria-label="已完成任务操作">
                  <label class="task-select-all-wrap" for="taskSelectAllCb">
                    <input id="taskSelectAllCb" type="checkbox" class="task-select-cb" aria-label="全选当前页可下载任务" />
                    <span>全选当前页</span>
                  </label>
                  <span id="taskSelectedLabel" class="task-selected-label">已选择 0 项</span>
                  <div class="task-batch-split" id="taskBatchSplit">
                    <button id="batchDownloadBtn" class="task-primary-btn task-batch-split-main" type="button" disabled>
                      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M12 3V14" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                        <path d="M8 10L12 14L16 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                        <path d="M4 17.5C4 18.8807 5.11929 20 6.5 20H17.5C18.8807 20 20 18.8807 20 17.5V17" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                      </svg>
                      <span>批量下载</span>
                    </button>
                    <button
                      id="batchDownloadSplitBtn"
                      type="button"
                      class="task-split-trigger"
                      disabled
                      aria-label="更多下载方式"
                      aria-haspopup="menu"
                      aria-expanded="false"
                    >
                      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" width="16" height="16">
                        <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                      </svg>
                    </button>
                    <div id="batchDownloadDropdown" class="task-dropdown-panel hidden" role="menu" aria-hidden="true">
                      <button type="button" class="task-dropdown-item" role="menuitem" id="batchDownloadRangeMenuItem">
                        按时间区间打包…
                      </button>
                    </div>
                  </div>
                </div>
                <div id="taskQueuedActions" class="task-completed-actions hidden" aria-label="排队任务批量操作">
                  <button id="cancelAllQueuedBtn" type="button" class="task-muted-btn" disabled>
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <path d="M7 7L17 17M17 7L7 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                    </svg>
                    <span>取消全部排队</span>
                  </button>
                </div>
                <div id="taskRunningActions" class="task-completed-actions hidden" aria-label="处理中任务批量操作">
                  <button id="cancelAllRunningBtn" type="button" class="task-muted-btn" disabled>
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <path d="M7 7L17 17M17 7L7 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                    </svg>
                    <span>全部取消</span>
                  </button>
                </div>
                <div id="taskFailedActions" class="task-completed-actions task-failed-actions hidden" aria-label="失败任务批量操作">
                  <button id="retryAllFailedBtn" class="task-primary-btn" type="button" disabled>
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <path d="M21 12A9 9 0 1 1 18.4 5.6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"></path>
                      <path d="M21 4V10H15" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                    <span>全部重试</span>
                  </button>
                  <button id="deleteAllFailedBtn" class="task-primary-btn danger" type="button" disabled>
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <path d="M4 7H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                      <path d="M10 11V17" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                      <path d="M14 11V17" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                      <path d="M6 7L7 20H17L18 7" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path>
                      <path d="M9 7V5C9 3.89543 9.89543 3 11 3H13C14.1046 3 15 3.89543 15 5V7" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                    </svg>
                    <span>全部删除</span>
                  </button>
                </div>
                <div id="taskCancelledActions" class="task-completed-actions hidden" aria-label="已取消任务批量操作">
                  <button id="retryAllCancelledBtn" class="task-primary-btn" type="button" disabled>
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <path d="M21 12A9 9 0 1 1 18.4 5.6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"></path>
                      <path d="M21 4V10H15" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                    <span>全部重试</span>
                  </button>
                  <button id="deleteAllCancelledBtn" class="task-primary-btn danger" type="button" disabled>
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <path d="M4 7H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                      <path d="M10 11V17" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                      <path d="M14 11V17" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                      <path d="M6 7L7 20H17L18 7" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path>
                      <path d="M9 7V5C9 3.89543 9.89543 3 11 3H13C14.1046 3 15 3.89543 15 5V7" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                    </svg>
                    <span>全部删除</span>
                  </button>
                </div>
              </div>

              <div id="historyList" class="task-list"></div>

              <div class="task-board-pager" aria-label="任务列表翻页">
                <div class="task-pager-left">
                  <span class="task-page-state">每页</span>
                  <select id="taskPageSizeSelect" class="task-page-size" aria-label="每页条数">
                    <option value="10" selected>10 条</option>
                    <option value="20">20 条</option>
                    <option value="50">50 条</option>
                  </select>
                </div>
                <div class="task-pager-center">
                  <button id="taskPrevBtn" class="task-page-btn" type="button" aria-label="上一页">上一页</button>
                  <div id="taskPageNumbers" class="task-pager-center"></div>
                  <button id="taskNextBtn" class="task-page-btn" type="button" aria-label="下一页">下一页</button>
                </div>
                <div class="task-pager-right">
                  <span id="taskPageLabel" class="task-page-state">第 1 / 1 页</span>
                  <span class="task-page-state">跳转</span>
                  <input id="taskJumpInput" class="task-jump-input" type="number" min="1" step="1" aria-label="跳转到页码" />
                </div>
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>

    <div
      id="confirmModal"
      class="modal-overlay hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="confirmModalTitle"
      aria-describedby="confirmModalDesc"
      hidden
    >
      <div class="modal-dialog">
        <h2 id="confirmModalTitle" class="modal-title"></h2>
        <p id="confirmModalDesc" class="modal-desc"></p>
        <div class="modal-actions" id="confirmModalActions">
  <button type="button" class="modal-btn modal-btn-cancel" id="confirmModalCancel">取消</button>
  <button type="button" class="modal-btn modal-btn-confirm" id="confirmModalOk">确定</button>
</div>
      </div>
    </div>

    <div
      id="rangeExportModal"
      class="modal-overlay hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="rangeExportTitle"
      hidden
    >
      <div class="modal-dialog modal-dialog-wide range-export-dialog" role="document">
        <div class="range-export-header">
          <h2 id="rangeExportTitle" class="modal-title range-export-title">按时间区间打包下载</h2>
          <button type="button" class="range-export-close" id="rangeExportClose" aria-label="关闭">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" width="20" height="20">
              <path d="M7 7L17 17M17 7L7 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
            </svg>
          </button>
        </div>
        <p id="rangeExportDesc" class="modal-desc">
          仅打包「已完成」任务，输出为 ZIP。时间区间与下方「关键词」「提交人」筛选（若已设置）一并生效，便于与列表核对。
        </p>
        <div class="range-export-form">
          <fieldset class="range-export-fieldset">
            <legend class="range-export-legend">时间依据</legend>
            <div class="range-export-seg" role="radiogroup" aria-label="时间依据">
              <label class="range-export-radio">
                <input type="radio" name="rangeExportTimeField" value="created_at" checked />
                <span>提交时间</span>
              </label>
              <label class="range-export-radio">
                <input type="radio" name="rangeExportTimeField" value="finished_at" />
                <span>完成时间</span>
              </label>
            </div>
          </fieldset>
          <div class="range-export-row">
            <label class="range-export-label" for="rangeExportStart">开始</label>
            <input id="rangeExportStart" class="range-export-input" type="datetime-local" autocomplete="off" />
          </div>
          <div class="range-export-row">
            <label class="range-export-label" for="rangeExportEnd">结束</label>
            <input id="rangeExportEnd" class="range-export-input" type="datetime-local" autocomplete="off" />
          </div>
          <p id="rangeExportFilterHint" class="range-export-hint" aria-live="polite"></p>
          <p id="rangeExportCount" class="range-export-count" aria-live="polite">请输入起止时间以预览数量。</p>
        </div>
        <div class="modal-actions">
          <button type="button" class="modal-btn modal-btn-cancel" id="rangeExportCancel">取消</button>
          <button type="button" class="modal-btn modal-btn-confirm" id="rangeExportSubmit" disabled>下载 ZIP</button>
        </div>
      </div>
    </div>

    <script>

      const folderInput = document.getElementById("folderInput");
      const fileInput = document.getElementById("fileInput");

      function getStoredAccessToken() {
        const exp = localStorage.getItem(STORAGE_KEYS.tokenExpiresAt);
        if (exp && Number(exp) < Date.now()) {
          localStorage.removeItem(STORAGE_KEYS.accessToken);
          localStorage.removeItem(STORAGE_KEYS.tokenExpiresAt);
          return null;

        return localStorage.getItem(STORAGE_KEYS.accessToken);

      async function collectJobIdsForCurrentFilters(statusFilter) {
        const pageSize = 100;
        let page = 1;
        const ids = [];
        let total = 0;
        while (true) {
          const params = new URLSearchParams();
          params.set("page", String(page));
          params.set("page_size", String(pageSize));
          params.set("status", statusFilter);
          if (taskSearchQuery) {
            params.set("q", taskSearchQuery);
          }
          if (currentUser && currentUser.role === "admin" && taskOwnerFilter && taskOwnerFilter.value) {
            params.set("owner", taskOwnerFilter.value);
          }
          const resp = await fetch("/jobs?" + params.toString(), {
            credentials: "same-origin",
            cache: "no-store",
            headers: mergeAuthHeaders({}),
          });
          const data = await resp.json().catch(function () {
            return {};
          });
          if (resp.status === 401) {
            setAuthState(null);
            return { error: "unauthorized", ids: [], total: 0 };
          }
          if (!resp.ok) {
            return { error: data.detail || "加载任务列表失败", ids: [], total: 0 };
          }
          total = Number(data.total) || 0;
          const items = data.items || [];
          for (let i = 0; i < items.length; i++) {
            const jid = items[i] && items[i].job_id;
            if (jid) ids.push(jid);
          }
          if (ids.length >= total || !items.length) {
            break;
          }
          page += 1;
          if (page > 5000) {
            break;
          }
        }
        return { error: null, ids: ids, total: total };
      }

      function localDatetimeLocalToIso(val) {
        if (!val) return "";
        const d = new Date(val);
        if (Number.isNaN(d.getTime())) return "";
        return d.toISOString();
      }

      function pad2(n) {
        return String(n).padStart(2, "0");
      }

      function dateToDatetimeLocalValue(d) {
        return (
          d.getFullYear() +
          "-" +
          pad2(d.getMonth() + 1) +
          "-" +
          pad2(d.getDate()) +
          "T" +
          pad2(d.getHours()) +
          ":" +
          pad2(d.getMinutes())
        );
      }

      function defaultRangeExportBounds() {
        const end = new Date();
        const start = new Date(end.getTime() - 7 * 24 * 60 * 60 * 1000);
        return { start: dateToDatetimeLocalValue(start), end: dateToDatetimeLocalValue(end) };
      }

        if (rangeExportPreviewTimer) {
          clearTimeout(rangeExportPreviewTimer);
          rangeExportPreviewTimer = 0;

      async function runRangeExportPreview() {
        if (!rangeExportModal || rangeExportModal.classList.contains("hidden")) return;
        if (!rangeExportStart || !rangeExportEnd || !rangeExportCount) return;
        const seq = ++rangeExportPreviewSeq;
        const ts = localDatetimeLocalToIso(rangeExportStart.value);
        const te = localDatetimeLocalToIso(rangeExportEnd.value);
        if (!ts || !te) {
          rangeExportCount.textContent = "请填写有效的开始与结束时间。";
          if (rangeExportSubmit) rangeExportSubmit.disabled = true;
          rangeExportLastPreview = null;
          return;
        }
        const params = new URLSearchParams();
        params.set("time_field", getRangeExportTimeField());
        params.set("time_start", ts);
        params.set("time_end", te);
        if (taskSearchQuery) params.set("q", taskSearchQuery);
        if (currentUser && currentUser.role === "admin" && taskOwnerFilter && taskOwnerFilter.value) {
          params.set("owner", taskOwnerFilter.value);
        }
        try {
          const resp = await fetch("/jobs/succeeded-range-preview?" + params.toString(), {
            credentials: "same-origin",
            cache: "no-store",
            headers: mergeAuthHeaders({}),
          });
          if (seq !== rangeExportPreviewSeq) return;
          if (resp.status === 401) {
            setAuthState(null);
            return;
          }
          const data = await resp.json().catch(function () {
            return {};
          });
          if (seq !== rangeExportPreviewSeq) return;
          if (!resp.ok) {
            rangeExportCount.textContent = data.detail || "预览失败，请检查时间或稍后重试。";
            if (rangeExportSubmit) rangeExportSubmit.disabled = true;
            rangeExportLastPreview = null;
            return;

          const n = Number(data.count) || 0;
          rangeExportLastPreview = { count: n };
          if (n === 0) {
            rangeExportCount.textContent = "符合当前条件的已完成任务：0 个，无法打包。";
            if (rangeExportSubmit) rangeExportSubmit.disabled = true;

          if (rangeExportSubmit) rangeExportSubmit.disabled = true;
          rangeExportLastPreview = null;
        }
      }

      function formatSupportedFormatsLine(allowedTypes) {
        const types = new Set(
          (Array.isArray(allowedTypes) ? allowedTypes : [])
            .map((x) => String(x || "").trim().toLowerCase())
            .filter(Boolean)
            .map((x) => (x.startsWith(".") ? x.slice(1) : x))
        );
        const parts = [];
        if (types.has("pdf")) parts.push("PDF");
        if (types.has("doc") || types.has("docx")) parts.push("Word");
        if (types.has("ppt") || types.has("pptx")) parts.push("PPT");
        if (types.has("xls") || types.has("xlsx")) parts.push("Excel");
        if (types.has("html") || types.has("htm")) parts.push("网页");
        const imgExts = ["png", "jpg", "jpeg", "tif", "tiff", "bmp", "webp"];
        if (imgExts.some((x) => types.has(x))) parts.push("图片");
        if (!parts.length) {
          return "多格式文档智能转 Markdown";
        }
        return parts.join("、") + " 智能转 Markdown";
      }

      function initMineruBackendSelector(configData) {
        if (!mineruBackendSelect) return;
        const preferredDefaultBackend = "hybrid-auto-engine";
        const backendLabelMap = {
          pipeline: "快速解析",
          "vlm-auto-engine": "高精度解析（本地）",
          "vlm-http-client": "高精度解析（API）",
          "hybrid-auto-engine": "混合高精度解析（本地）",
          "hybrid-http-client": "混合高精度解析（API）",
        };
        const formatBackendLabel = (value) => {
          const key = String(value || "").trim();
          return backendLabelMap[key] || key || "未设置";
        };
        const options = Array.isArray(configData && configData.mineru_backend_options)
          ? configData.mineru_backend_options
          : [];
        const defaults = (configData && configData.mineru_backend_default) || "";
        if (options.length) {
          const prev = mineruBackendSelect.value;
          mineruBackendSelect.innerHTML = options
            .map((v) => {
              const val = String(v || "").trim();
              if (!val) return "";
              return '<option value="' + val.replace(/"/g, "&quot;") + '">' + formatBackendLabel(val) + "</option>";
            })
            .join("");
          if (prev && options.indexOf(prev) !== -1) {
            mineruBackendSelect.value = prev;
          } else if (defaults && options.indexOf(defaults) !== -1) {
            mineruBackendSelect.value = defaults;
          } else if (options.indexOf(preferredDefaultBackend) !== -1) {
            mineruBackendSelect.value = preferredDefaultBackend;
          } else if (options.length) {
            mineruBackendSelect.value = options[0];
          }
          return;
        }
        if (defaults) {
          mineruBackendSelect.value = defaults;
          return;
        }
        mineruBackendSelect.value = preferredDefaultBackend;
      }

      const TASK_PAGE_SIZES = [10, 20, 50];

      function normalizeTaskPageSize(value) {
        const n = Number(value);
        if (!Number.isFinite(n) || n <= 0) return TASK_PAGE_SIZES[0];
        let best = TASK_PAGE_SIZES[0];
        let bestDiff = Math.abs(n - best);
        for (let i = 1; i < TASK_PAGE_SIZES.length; i++) {
          const s = TASK_PAGE_SIZES[i];
          const diff = Math.abs(n - s);
          if (diff < bestDiff) {
            best = s;
            bestDiff = diff;
          }
        }
        return best;
      }

      function formatBytes(n) {
        const x = Number(n);
        if (!Number.isFinite(x) || x < 0) return "0 B";
        if (x < 1024) return x + " B";
        if (x < 1048576) return (x / 1024).toFixed(1) + " KB";
        return (x / 1048576).toFixed(1) + " MB";
      }

      /** 根据秒数格式化为中文剩余时间文案（用于上传 ETA） */
      function formatEtaSeconds(sec) {
        const s = Number(sec);
        if (!Number.isFinite(s) || s <= 0) return "";
        const ceil = Math.ceil(s);
        if (ceil < 60) return ceil + " 秒";
        if (ceil < 3600) {
          const m = Math.floor(ceil / 60);
          const rs = ceil % 60;
          if (rs === 0) return m + " 分钟";
          return m + " 分 " + rs + " 秒";
        }
        const h = Math.floor(ceil / 3600);
        const m = Math.floor((ceil % 3600) / 60);
        if (m === 0) return h + " 小时";
        return h + " 小时 " + m + " 分";
      }

      /**
       * 用已传字节与耗时估算剩余时间；起步阶段返回空串避免抖动。
       * @returns {string} 如 " · 剩余约 12 秒"，无可估算时 ""
       */
      function formatUploadEta(loaded, total, elapsedSec) {
        const L = Number(loaded);
        const T = Number(total);
        const elapsed = Number(elapsedSec);
        if (!Number.isFinite(L) || !Number.isFinite(T) || T <= 0 || L <= 0 || L >= T) {
          return "";
        }
        if (!Number.isFinite(elapsed) || elapsed < 0.45) {
          return "";
        }
        const speed = L / elapsed;
        if (speed < 200) {
          return "";
        }
        const etaSec = (T - L) / speed;
        if (!Number.isFinite(etaSec) || etaSec < 0.5) {
          return "";
        }
        if (etaSec > 48 * 3600) {
          return " · 剩余超过 48 小时";
        }
        return " · 剩余约 " + formatEtaSeconds(etaSec);
      }

      /**
       * 主题化确认框（替代浏览器 confirm）。opts: title, message, confirmText, cancelText, danger
       * @returns {Promise<boolean>}
       */
      function openThemedConfirm(opts) {
        opts = opts || {};
        return new Promise(function (resolve) {
          if (!confirmModal || !confirmModalOk || !confirmModalCancel) {
            resolve(false);
            return;
          }
          var title = opts.title != null ? opts.title : "确认";
          var message = opts.message != null ? opts.message : "";
          var confirmText = opts.confirmText != null ? opts.confirmText : "确定";
          var cancelText = opts.cancelText != null ? opts.cancelText : "取消";
          var danger = !!opts.danger;
          var prevActive = document.activeElement;
          var settled = false;

          confirmModalTitle.textContent = title;
          confirmModalDesc.textContent = message;
          confirmModalOk.textContent = confirmText;
          confirmModalCancel.textContent = cancelText;

          confirmModalOk.classList.remove("modal-btn-confirm", "modal-btn-danger");
          if (danger) {
            confirmModalOk.classList.add("modal-btn-danger");
          } else {
            confirmModalOk.classList.add("modal-btn-confirm");
          }

          function finish(result) {
            if (settled) {
              return;
            }
            settled = true;
            document.removeEventListener("keydown", onDocKey);
            confirmModalOk.onclick = null;
            confirmModalCancel.onclick = null;
            confirmModal.onclick = null;
            confirmModal.classList.add("hidden");
            confirmModal.setAttribute("hidden", "");
            if (prevActive && typeof prevActive.focus === "function") {
              try {
                prevActive.focus();
              } catch (e) {
                /* ignore */
              }
            }
            resolve(result);
          }

          function onDocKey(e) {
            if (e.key === "Escape") {
              e.preventDefault();
              finish(false);
            }
          }

          confirmModalOk.onclick = function () {
            finish(true);
          };
          confirmModalCancel.onclick = function () {
            finish(false);
          };
          confirmModal.onclick = function (e) {
            if (e.target === confirmModal) {
              finish(false);
            }
          };

          document.addEventListener("keydown", onDocKey);
          confirmModal.classList.remove("hidden");
          confirmModal.removeAttribute("hidden");
          (danger ? confirmModalCancel : confirmModalOk).focus();
        });
      }

      function formatTime(iso) {
        if (!iso) return "—";
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return iso;
        return d.toLocaleString("zh-CN", { hour12: false });
      }

      function parseIsoMs(iso) {
        if (!iso) return null;
        const d = new Date(iso);
        const t = d.getTime();
        return Number.isNaN(t) ? null : t;
      }

      /** 毫秒 → 中文耗时，如「45秒」「3分12秒」「1小时5分」 */
      function formatDurationZh(ms) {
        const n = Number(ms);
        if (!Number.isFinite(n) || n < 0) return "0秒";
        const sec = Math.floor(n / 1000);
        if (sec < 60) return sec + "秒";
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        if (m < 60) {
          return s === 0 ? m + "分钟" : m + "分" + s + "秒";
        }
        const h = Math.floor(m / 60);
        const rm = m % 60;
        if (rm === 0) return h + "小时";
        return h + "小时" + rm + "分";
      }

      /** 已完成任务：仅展示耗时（开始处理→结束），不包含排队等待 */
      function totalDurationMetaLine(job) {
        const term = { succeeded: 1, failed: 1, cancelled: 1 };
        if (!term[job.status] || !job.finished_at || !job.started_at) return "";
        const st = parseIsoMs(job.started_at);
        const f = parseIsoMs(job.finished_at);
        if (st == null || f == null || f < st) return "";
        return " · 耗时 " + formatDurationZh(f - st);
      }

      function parseProgressNoteEtaSeconds(note) {
        const m = String(note || "").match(/预计剩余\s+(\d+)\s*秒/);
        if (!m) return null;
        const n = parseInt(m[1], 10);
        return Number.isFinite(n) && n > 1 ? n : null;
      }

      function stripProgressNoteEtaSegment(note) {
        return String(note || "")

      function syncTaskPager() {
        if (taskPageSizeSelect) {
          const raw = Number(taskPageSizeSelect.value);
          if (Number.isFinite(raw) && raw > 0) {
            taskPageSize = normalizeTaskPageSize(raw);
          }
          taskPageSizeSelect.value = String(taskPageSize);
        }
        let taskPage = getCurrentTaskPage();
        taskTotal = Math.max(0, Math.floor(Number(taskTotal) || 0));
        const totalPages = taskPageSize > 0 ? Math.max(1, Math.ceil(taskTotal / taskPageSize)) : 1;
        if (taskPage > totalPages) taskPage = totalPages;
        setCurrentTaskPage(taskPage);
        if (taskPrevBtn) taskPrevBtn.disabled = taskPage <= 1;
        if (taskNextBtn) taskNextBtn.disabled = taskPage >= totalPages;
        if (taskPageLabel) taskPageLabel.textContent = "第 " + taskPage + " / " + totalPages + " 页";
        if (taskJumpInput) taskJumpInput.value = "";
        if (taskPageNumbers) {
          const pages = [];
          const pushPage = (p) => pages.push({ t: String(p), p });
          const pushDots = () => pages.push({ t: "…", p: null });
          if (totalPages <= 7) {
            for (let i = 1; i <= totalPages; i++) pushPage(i);
          } else {
            pushPage(1);
            if (taskPage > 4) pushDots();
            const start = Math.max(2, taskPage - 1);
            const end = Math.min(totalPages - 1, taskPage + 1);
            for (let i = start; i <= end; i++) pushPage(i);
            if (taskPage < totalPages - 3) pushDots();
            pushPage(totalPages);
          }
          taskPageNumbers.innerHTML = pages
            .map((x) => {
              if (x.p == null) return '<span class="task-page-dots">…</span>';
              const active = x.p === taskPage ? " active" : "";
              return (
                '<button type="button" class="task-page-btn' +
                active +
                '" data-task-page="' +
                x.p +
                '">' +
                x.t +
                "</button>"
              );
            })
            .join("");
        }
      }

      async function refreshTaskList(opts) {
        opts = opts || {};
        if (!currentUser) {
          historyWrap.classList.remove("show");
          historyList.innerHTML = "";
          return;
        }
        const requestSeq = ++taskListRequestSeq;
        if (taskListAbortController) {
          try {
            taskListAbortController.abort();
          } catch (e) {
            /* ignore */
          }
        }
        taskListAbortController = new AbortController();
        if (opts.page_size != null) {
          const ps = Number(opts.page_size);
          if (Number.isFinite(ps) && ps > 0) {
            taskPageSize = normalizeTaskPageSize(ps);
          }
        }
        if (opts.page != null) {
          const p = Number(opts.page);
          if (Number.isFinite(p) && p > 0) {
            setCurrentTaskPage(Math.max(1, Math.floor(p)));
          }
        }
        if (opts.resetPage) {
          setCurrentTaskPage(1);
        }
        syncTaskPager();
        if (!opts.silent) {
          historyWrap.classList.add("show");
          historyList.innerHTML =
            '<p class="history-meta" style="margin:0;color:var(--text-sub)">加载任务列表…</p>';
        }
        try {
          const params = new URLSearchParams();
          params.set("page", String(getCurrentTaskPage()));
          params.set("page_size", String(taskPageSize));
          if (taskSearchQuery) {
            params.set("q", taskSearchQuery);
          }
          if (currentUser.role === "admin") {
            if (taskOwnerFilter.value) params.set("owner", taskOwnerFilter.value);
          }
          const activeStatusValue = getActiveTaskStatusQueryValue();
          if (activeStatusValue) params.set("status", activeStatusValue);
          const resp = await fetch("/jobs?" + params.toString(), {
            credentials: "same-origin",
            cache: "no-store",
            signal: taskListAbortController.signal,
          });
          if (requestSeq !== taskListRequestSeq) return;
          if (resp.status === 401) {
            setAuthState(null);
            return;
          }
          const data = await resp.json();
          if (requestSeq !== taskListRequestSeq) return;
          if (!resp.ok) {
            if (!opts.silent) showToast("error", data.detail || "加载任务失败");
            if (!opts.silent) {
              historyWrap.classList.add("show");
              historyList.innerHTML =
                '<p class="history-meta" style="margin:0">加载失败，请稍后点击「刷新」重试。</p>';
            }
            return;
          }
          updateTaskStatusTabCounts(data.status_counts || {});
          taskTotal = Number(data.total) || 0;
          renderTaskItems(data.items || []);
          updateTaskPollingFromItems(data.items || []);
          setCurrentTaskPage(Number(data.page) || getCurrentTaskPage());
          taskPageSize = normalizeTaskPageSize(data.page_size);
          updateTaskSectionHeader();
          syncTaskPager();
        } catch (e) {
          if (e && e.name === "AbortError") return;
          if (requestSeq !== taskListRequestSeq) return;
          if (!opts.silent) showToast("error", "加载任务列表失败");
          if (!opts.silent) {
            historyWrap.classList.add("show");
            historyList.innerHTML =
              '<p class="history-meta" style="margin:0">加载失败，请稍后点击「刷新」重试。</p>';
          }
        }
      }

      async function pollJobUntilTerminal(jobId, generation) {
        const terminal = { succeeded: 1, failed: 1, cancelled: 1 };
        // 任务进度在任务列表中展示；此处仅轮询以在完成后更新结果区与 Toast。

        while (true) {
          if (generation !== uploadGeneration) {
            return;
          }
          try {
            await refreshTaskList({ silent: true });
            if (generation !== uploadGeneration) {
              return;
            }
            const resp = await fetch("/jobs/" + encodeURIComponent(jobId), {
              credentials: "same-origin",
              cache: "no-store",
              headers: mergeAuthHeaders({}),
            });
            if (resp.status === 401) {
              setAuthState(null);
              return;
            }
            const job = await resp.json();
            if (!resp.ok) {
              if (resp.status === 404) {
                await refreshTaskList();
                if (generation === uploadGeneration) {
                  showToast("success", "该任务记录已不存在");
                }
                break;
              }
              if (generation === uploadGeneration) {
                setStatus("error", job.detail || "无法获取任务状态");
              }
              break;
            }
            if (terminal[job.status]) {
              if (generation !== uploadGeneration) {
                return;
              }
              if (job.status === "succeeded") {
    let msg = "转换完成";
    const st = parseIsoMs(job.started_at);
    const f = parseIsoMs(job.finished_at);
    if (st != null && f != null && f >= st) {
      msg += "，耗时 " + formatDurationZh(f - st);
    }

    setStatus("success", msg);
    resultFilename.textContent = job.original_filename || "";
    downloadBtn.href = job.download_url || "#";
    result.classList.add("show");
    progressWrap.classList.remove("show");
    resetProgressBar();

      async function readAllDirectoryEntries(dirReader) {
    const entries = [];
    while (true) {
      const batch = await new Promise((resolve, reject) => {
        dirReader.readEntries(resolve, reject);
      });
      if (!batch || !batch.length) {
        break;
      }
      entries.push(...batch);
    }
    return entries;
  }

  async function walkEntry(entry, pathPrefix) {
    if (!entry) return [];

    if (entry.isFile) {
      const file = await new Promise((resolve, reject) => {
        entry.file(resolve, reject);
      });

      const relPath = pathPrefix ? (pathPrefix + "/" + file.name) : file.name;

      try {
        Object.defineProperty(file, "webkitRelativePath", {
          value: relPath,
          configurable: true,
        });
      } catch (e) {
        file._relativePath = relPath;
      }

      if (!file._relativePath) {
        file._relativePath = relPath;
      }

      return [file];
    }

    if (entry.isDirectory) {
      const dirPath = pathPrefix ? (pathPrefix + "/" + entry.name) : entry.name;
      const reader = entry.createReader();
      const children = await readAllDirectoryEntries(reader);

      let files = [];
      for (const child of children) {
        const subFiles = await walkEntry(child, dirPath);
        files = files.concat(subFiles);
      }
      return files;
    }

    return [];
  }

async function extractDroppedFiles(dataTransfer) {
  if (!dataTransfer) {
    return { mode: "file", files: [] };
  }

  const items = Array.from(dataTransfer.items || []);
  const hasEntryApi = items.some(
    (item) => item && typeof item.webkitGetAsEntry === "function"
  );

  if (!hasEntryApi) {
    return {
      mode: "file",
      files: Array.from(dataTransfer.files || []),
    };
  }

  let allFiles = [];
  let hasDirectory = false;

  for (const item of items) {
    if (!item || item.kind !== "file") continue;

    const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
    if (!entry) continue;

    if (entry.isDirectory) {
      hasDirectory = true;
    }

    const files = await walkEntry(entry, "");
    allFiles = allFiles.concat(files);
  }

  return {
    mode: hasDirectory ? "folder" : "file",
    files: allFiles,
  };
}

      function postJobsWithUploadProgress(formData, myGen, totalBytes) {
        const progressText = progressWrap.querySelector(".progress-text");
        return new Promise(function (resolve, reject) {
          const xhr = new XMLHttpRequest();
          xhr.open("POST", "/jobs");
          xhr.withCredentials = true;
          const ah = authHeaderObject();
          if (ah.Authorization) {
            xhr.setRequestHeader("Authorization", ah.Authorization);
          }
          uploadXhr = xhr;
          let uploadT0 = 0;
          xhr.upload.addEventListener("progress", function (e) {
            if (myGen !== uploadGeneration) {
              return;
            }
            const fileSize = typeof totalBytes === "number"
              ? totalBytes
              : (currentFiles || []).reduce(function (sum, f) {
  return sum + (f && f.size ? f.size : 0);
}, 0);

            const total =
              e.lengthComputable && e.total > 0 ? e.total : fileSize > 0 ? fileSize : 0;
            const elapsedSec = uploadT0 > 0 ? (performance.now() - uploadT0) / 1000 : 0;
            if (total > 0 && progressFill) {
              progressWrap.classList.add("progress-upload");
              const pct = Math.min(100, Math.round((e.loaded / total) * 100));
              progressFill.style.width = pct + "%";
              if (progressTrack) {
                progressTrack.setAttribute("aria-valuenow", String(pct));
              }
              const eta = formatUploadEta(e.loaded, total, elapsedSec);
              progressText.textContent =
                "上传中 " +
                pct +
                "%（" +
                formatBytes(e.loaded) +
                " / " +
                formatBytes(total) +
                "）" +
                eta;
            } else {
              progressWrap.classList.remove("progress-upload");
              if (progressFill) progressFill.style.width = "0%";
              if (progressTrack) progressTrack.setAttribute("aria-valuenow", "0");
              progressText.textContent = "上传中… " + formatBytes(e.loaded);
            }
          });
          xhr.onload = function () {
            if (uploadXhr === xhr) uploadXhr = null;
            if (myGen !== uploadGeneration) {
              return;
            }
            let payload = null;
            try {
              payload = xhr.responseText ? JSON.parse(xhr.responseText) : null;
            } catch (err) {
              payload = { detail: xhr.responseText || "响应解析失败" };
            }
            resolve({ ok: xhr.status >= 200 && xhr.status < 300, status: xhr.status, payload: payload });
          };
          xhr.onerror = function () {
            if (uploadXhr === xhr) uploadXhr = null;
            if (myGen !== uploadGeneration) {
              return;
            }
            reject(new Error("network"));
          };
          xhr.onabort = function () {
            if (uploadXhr === xhr) uploadXhr = null;
            if (myGen !== uploadGeneration) {
              return;
            }
            reject(new Error("aborted"));
          };
          uploadT0 = performance.now();
          xhr.send(formData);
        });
      }

      async function uploadAndConvert() {
        resetResult();
        resetProgressBar();
        progressWrap.classList.remove("show");
        statusBox.className = "status-box";
        statusBox.textContent = "";
        if (!currentFiles || !currentFiles.length) {
  setStatus("error", "请先选择要上传的文件或文件夹");
  return;
}

        const myGen = ++uploadGeneration;
        const oldText = convertBtn.textContent;
        convertBtn.disabled = true;
        convertBtn.textContent = "提交中...";
        const progressText = progressWrap.querySelector(".progress-text");
        try {
          progressWrap.classList.add("show");
          progressWrap.classList.add("progress-upload");
          if (progressFill) progressFill.style.width = "0%";
          if (progressTrack) progressTrack.setAttribute("aria-valuenow", "0");
          progressText.textContent = "开始上传…";
          if (uploadCancelBtn) {
            uploadCancelBtn.hidden = false;
            uploadCancelBtn.disabled = false;
          }

          const jobIds = [];
          const failedUploads = [];

          if (currentUploadMode === "folder") {
            for (let i = 0; i < currentFiles.length; i++) {
              if (myGen !== uploadGeneration) {
                return;
              }
              const f = currentFiles[i];
              const rel = f.webkitRelativePath || f._relativePath || f.name;
              const namedFile = new File([f], rel, {
                type: f.type,
                lastModified: f.lastModified,
              });

              progressText.textContent =
                "开始上传（" + (i + 1) + "/" + currentFiles.length + "）…";
              if (progressFill) progressFill.style.width = "0%";
              if (progressTrack) progressTrack.setAttribute("aria-valuenow", "0");

              const formData = new FormData();
              formData.append("files", namedFile);
              formData.append("relative_paths", rel);
              formData.append("upload_kind", "file");
              formData.append("root_name", "");
              appendMineruBackendField(formData);

              const { ok, status, payload } = await postJobsWithUploadProgress(
                formData,
                myGen,
                f.size || 0
              );
              if (status === 401) {
                setAuthState(null);
                setStatus("error", "登录已失效，请重新登录");
                resetProgressBar();
                progressWrap.classList.remove("show");
                return;
              }
              if (!ok) {
                console.error("create job failed:", status, payload);
                failedUploads.push({
                  name: rel,
                  detail: (payload && payload.detail) || ("创建任务失败，HTTP " + status),
                });
                continue;
              }
              const jobId = payload && payload.job_id;
              if (jobId) {
                jobIds.push(jobId);
              } else {
                failedUploads.push({ name: rel, detail: "未返回任务 ID" });
              }
            }
          } else if (currentFiles.length === 1) {
            const f = currentFiles[0];
            const formData = new FormData();
            formData.append("files", f);
            formData.append("relative_paths", f.name);
            formData.append("upload_kind", "file");
            formData.append("root_name", "");
            appendMineruBackendField(formData);

            const { ok, status, payload } = await postJobsWithUploadProgress(formData, myGen, f.size || 0);
            if (status === 401) {
              setAuthState(null);
              setStatus("error", "登录已失效，请重新登录");
              resetProgressBar();
              progressWrap.classList.remove("show");
              return;
            }
            if (!ok) {
              console.error("create job failed:", status, payload);
              setStatus("error", (payload && payload.detail) || ("创建任务失败，HTTP " + status));
              resetProgressBar();
              progressWrap.classList.remove("show");
              return;
            }
            const jobId = payload && payload.job_id;
            if (jobId) {
              jobIds.push(jobId);
            } else {
              setStatus("error", "未返回任务 ID");
              resetProgressBar();
              progressWrap.classList.remove("show");
              return;
            }
          } else {
            for (let i = 0; i < currentFiles.length; i++) {
              if (myGen !== uploadGeneration) {
                return;
              }
              const f = currentFiles[i];
              progressText.textContent =
                "开始上传（" + (i + 1) + "/" + currentFiles.length + "）…";
              if (progressFill) progressFill.style.width = "0%";
              if (progressTrack) progressTrack.setAttribute("aria-valuenow", "0");

              const formData = new FormData();
              formData.append("files", f);
              formData.append("relative_paths", f.name);
              formData.append("upload_kind", "file");
              formData.append("root_name", "");
              appendMineruBackendField(formData);

              const { ok, status, payload } = await postJobsWithUploadProgress(formData, myGen, f.size || 0);
              if (status === 401) {
                setAuthState(null);
                setStatus("error", "登录已失效，请重新登录");
                resetProgressBar();
                progressWrap.classList.remove("show");
                return;
              }
              if (!ok) {
                console.error("create job failed:", status, payload);
                failedUploads.push({
                  name: f.name,
                  detail: (payload && payload.detail) || ("创建任务失败，HTTP " + status),
                });
                continue;
              }
              const jobId = payload && payload.job_id;
              if (jobId) {
                jobIds.push(jobId);
              } else {
                failedUploads.push({ name: f.name, detail: "未返回任务 ID" });
              }
            }
          }

          if (myGen !== uploadGeneration) {
            return;
          }
          // 上传请求已经结束：进入任务创建/轮询阶段，不再需要「取消上传」按钮。
          if (uploadCancelBtn) {
            uploadCancelBtn.hidden = true;
            uploadCancelBtn.disabled = false;
          }
          resetProgressBar();
          progressWrap.classList.remove("show");

        await refreshTaskList();
        clearCurrentSelection();

          if (jobIds.length) {
            setStatus("success", "任务已创建，正在后台处理");
            for (const jobId of jobIds) {
              pollJobUntilTerminal(jobId, myGen);
            }
          } else {
            setStatus("error", "未创建任何任务");
            resetProgressBar();
            progressWrap.classList.remove("show");
            return;
          }

          if (!failedUploads.length) {
            showToast("success", "已提交 " + jobIds.length + " 个任务");
          } else if (jobIds.length) {
            showToast("warn", "已提交 " + jobIds.length + " 个任务，失败 " + failedUploads.length + " 个");
          } else {
            showToast("error", "上传失败 " + failedUploads.length + " 个文件");
          }

        } catch (error) {
          if (myGen === uploadGeneration) {
            const message = String((error && error.message) || "");
            if (message === "aborted") {
              setStatus("success", "已取消上传");
              resetProgressBar();
              progressWrap.classList.remove("show");
            } else {
              console.error("upload failed:", error);
setStatus("error", "请求失败：" + (error && error.message ? error.message : "未知错误"));

              resetProgressBar();
              progressWrap.classList.remove("show");
            }
          }
        } finally {
          convertBtn.textContent = oldText;
          if (uploadCancelBtn) {
            uploadCancelBtn.hidden = true;
            uploadCancelBtn.disabled = false;
          }
          updateConvertButtonState();
        }
      }
