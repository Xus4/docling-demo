<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文档转 Markdown</title>
    <style>
      :root {
        --bg-0: #0c1221;
        --bg-1: #13203d;
        --bg-2: #0f182d;
        --glass: rgba(14, 20, 34, 0.72);
        --glass-strong: rgba(16, 23, 38, 0.9);
        --stroke: rgba(255, 115, 115, 0.2);
        --stroke-strong: rgba(255, 110, 110, 0.64);
        --text-main: #f5f1ff;
        --text-sub: #baadc8;
        --brand: #ff5858;
        --brand-2: #d83232;
        --bg-glow-1: rgba(255, 79, 79, 0.22);
        --bg-glow-2: rgba(255, 110, 79, 0.18);
        --bg-glow-3: rgba(255, 61, 135, 0.12);
        --orb-1: rgba(255, 92, 92, 0.38);
        --orb-2: rgba(255, 67, 132, 0.28);
        --title-shadow: 0 14px 30px rgba(255, 78, 78, 0.2);
        --shell-bg:
          radial-gradient(120% 130% at 10% 0%, rgba(255, 80, 80, 0.14), transparent 48%),
          linear-gradient(145deg, rgba(12, 18, 31, 0.9), rgba(14, 21, 36, 0.82) 52%, rgba(21, 14, 29, 0.88));
        --shell-glow: rgba(255, 80, 80, 0.14);
        --shell-inner: rgba(255, 90, 90, 0.08);
        --topbar-stroke: rgba(255, 111, 111, 0.14);
        --field-bg: transparent;
        --field-border: rgba(255, 102, 102, 0.24);
        --field-focus: rgba(255, 108, 108, 0.7);
        --field-focus-ring: rgba(255, 98, 98, 0.2);
        --field-focus-glow: rgba(255, 84, 84, 0.24);
        --field-icon: rgba(255, 175, 175, 0.78);
        --field-text: #ffeef0;
        --field-placeholder: rgba(255, 193, 193, 0.4);
        --button-border: rgba(255, 92, 92, 0.36);
        --button-overlay-1: rgba(255, 99, 99, 0.15);
        --button-overlay-2: rgba(255, 72, 72, 0.26);
        --button-shadow-1: rgba(188, 34, 34, 0.28);
        --button-shadow-2: rgba(255, 92, 92, 0.2);
        --button-shadow-hover-1: rgba(188, 34, 34, 0.36);
        --button-shadow-hover-2: rgba(255, 92, 92, 0.26);
        --dropzone-border: rgba(255, 106, 106, 0.36);
        --dropzone-glow: rgba(255, 74, 74, 0.14);
        --dropzone-bg: rgba(17, 23, 38, 0.76);
        --dropzone-shine: rgba(255, 101, 101, 0.28);
        --dropzone-hover-inner: rgba(255, 98, 98, 0.2);
        --dropzone-hover-glow: rgba(255, 92, 92, 0.12);
        --dropzone-drag-inner: rgba(255, 92, 92, 0.26);
        --dropzone-drag-glow: rgba(255, 92, 92, 0.22);
        --panel-bg: rgba(18, 24, 40, 0.52);
        --panel-border: rgba(255, 110, 110, 0.16);
        --section-divider: rgba(255, 110, 110, 0.18);
        --status-loading-bg: rgba(112, 45, 45, 0.32);
        --status-loading-text: #ffbbbb;
        --status-loading-border: rgba(255, 101, 101, 0.28);
        --success-bg: rgba(11, 83, 54, 0.35);
        --success-text: #95ffd0;
        --error-bg: rgba(121, 30, 30, 0.38);
        --error-text: #ffc2c2;
        --shadow-xl: 0 30px 72px rgba(1, 7, 20, 0.62);
      }

      body[data-theme="light"] {
        --bg-0: #edf1fb;
        --bg-1: #e5ecff;
        --bg-2: #f5f8ff;
        --glass: rgba(255, 255, 255, 0.52);
        --glass-strong: rgba(255, 255, 255, 0.68);
        --stroke: rgba(108, 130, 181, 0.26);
        --stroke-strong: rgba(76, 112, 220, 0.6);
        --text-main: #1d2534;
        --text-sub: #6d7a92;
        --brand: #4f67ff;
        --brand-2: #3649ca;
        --bg-glow-1: rgba(95, 124, 255, 0.18);
        --bg-glow-2: rgba(106, 170, 255, 0.16);
        --bg-glow-3: rgba(168, 111, 255, 0.12);
        --orb-1: rgba(98, 124, 255, 0.24);
        --orb-2: rgba(139, 120, 255, 0.18);
        --title-shadow: 0 12px 26px rgba(79, 103, 255, 0.18);
        --shell-bg:
          radial-gradient(120% 130% at 10% 0%, rgba(94, 122, 255, 0.12), transparent 48%),
          linear-gradient(145deg, rgba(255, 255, 255, 0.9), rgba(245, 249, 255, 0.9) 52%, rgba(240, 245, 255, 0.86));
        --shell-glow: rgba(94, 122, 255, 0.12);
        --shell-inner: rgba(97, 124, 255, 0.08);
        --topbar-stroke: rgba(98, 122, 190, 0.16);
        --field-bg: transparent;
        --field-border: rgba(113, 135, 187, 0.34);
        --field-focus: rgba(79, 103, 255, 0.72);
        --field-focus-ring: rgba(79, 103, 255, 0.2);
        --field-focus-glow: rgba(79, 103, 255, 0.2);
        --field-icon: rgba(89, 108, 162, 0.78);
        --field-text: #1f2a45;
        --field-placeholder: rgba(99, 114, 152, 0.6);
        --button-border: rgba(85, 111, 255, 0.4);
        --button-overlay-1: rgba(111, 133, 255, 0.18);
        --button-overlay-2: rgba(83, 109, 255, 0.2);
        --button-shadow-1: rgba(70, 93, 205, 0.26);
        --button-shadow-2: rgba(90, 118, 255, 0.22);
        --button-shadow-hover-1: rgba(70, 93, 205, 0.34);
        --button-shadow-hover-2: rgba(90, 118, 255, 0.3);
        --dropzone-border: rgba(95, 120, 205, 0.34);
        --dropzone-glow: rgba(95, 120, 240, 0.1);
        --dropzone-bg: rgba(250, 252, 255, 0.82);
        --dropzone-shine: rgba(118, 142, 255, 0.3);
        --dropzone-hover-inner: rgba(79, 103, 255, 0.16);
        --dropzone-hover-glow: rgba(90, 118, 255, 0.14);
        --dropzone-drag-inner: rgba(79, 103, 255, 0.2);
        --dropzone-drag-glow: rgba(90, 118, 255, 0.2);
        --panel-bg: rgba(255, 255, 255, 0.74);
        --panel-border: rgba(105, 128, 186, 0.22);
        --section-divider: rgba(108, 130, 181, 0.2);
        --status-loading-bg: rgba(79, 103, 255, 0.14);
        --status-loading-text: #3953cc;
        --status-loading-border: rgba(79, 103, 255, 0.24);
        --success-bg: rgba(16, 185, 129, 0.16);
        --success-text: #0d8a61;
        --error-bg: rgba(239, 68, 68, 0.16);
        --error-text: #c93b3b;
        --shadow-xl: 0 26px 65px rgba(29, 42, 80, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 40px 16px;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text-main);
        background:
          radial-gradient(44% 34% at 8% 10%, var(--bg-glow-1), transparent 70%),
          radial-gradient(34% 28% at 92% 8%, var(--bg-glow-2), transparent 72%),
          radial-gradient(30% 24% at 84% 88%, var(--bg-glow-3), transparent 74%),
          linear-gradient(140deg, var(--bg-0) 0%, var(--bg-1) 44%, var(--bg-2) 100%);
        overflow-x: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        pointer-events: none;
        z-index: 0;
        border-radius: 999px;
        filter: blur(70px);
        opacity: 0.6;
        animation: floatGlow 8s ease-in-out infinite alternate;
      }

      body::before {
        width: 260px;
        height: 260px;
        left: -70px;
        top: 16%;
        background: var(--orb-1);
      }

      body::after {
        width: 230px;
        height: 230px;
        right: -56px;
        bottom: 12%;
        background: var(--orb-2);
        animation-delay: 1.2s;
      }

      @keyframes floatGlow {
        from { transform: translateY(0); }
        to { transform: translateY(-16px); }
      }

      .page {
        width: 100%;
        max-width: 1100px;
        margin: 0 auto;
        position: relative;
        z-index: 1;
      }

      .page::before {
        content: "";
        position: absolute;
        inset: 80px 8% auto;
        height: 420px;
        pointer-events: none;
        background:
          radial-gradient(32% 34% at 14% 30%, color-mix(in srgb, var(--brand) 28%, transparent), transparent 74%),
          radial-gradient(30% 32% at 86% 36%, color-mix(in srgb, var(--brand-2) 26%, transparent), transparent 76%);
        filter: blur(36px);
        opacity: 0.55;
        z-index: -1;
      }

      .brand {
        text-align: center;
        margin-bottom: 34px;
      }

      .brand h1 {
        margin: 0;
        font-size: clamp(32px, 4vw, 44px);
        line-height: 1.16;
        letter-spacing: 0.2px;
        font-weight: 760;
        text-shadow: var(--title-shadow);
      }

      .brand p {
        margin: 14px 0 0;
        color: var(--text-sub);
        font-size: 15px;
      }

      /* 右上角统一工具栏（主题 / 用户 / 退出） */
      .top-bar-icon-btn {
        width: 38px;
        height: 38px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: none;
        border-radius: 11px;
        background: transparent;
        color: var(--text-main);
        font-size: 0;
        padding: 0;
        cursor: pointer;
        flex-shrink: 0;
        transition:
          background 0.2s ease,
          color 0.2s ease,
          transform 0.08s ease;
      }

      .top-bar-icon-btn:hover {
        background: color-mix(in srgb, var(--brand) 18%, transparent);
        color: var(--brand);
      }

      .top-bar-icon-btn:active {
        transform: scale(0.96);
      }

      .top-bar-icon-btn svg {
        width: 19px;
        height: 19px;
      }

      .shell {
        background: var(--shell-bg);
        border: 1px solid var(--stroke);
        border-radius: 18px;
        box-shadow: var(--shadow-xl), 0 0 0 1px var(--shell-inner) inset;
        backdrop-filter: blur(22px);
        -webkit-backdrop-filter: blur(22px);
        padding: 22px;
      }

      .shell.login-shell {
        max-width: 560px;
        margin: 0 auto;
      }

      .session-boot {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        min-height: 200px;
        padding: 28px 16px 20px;
        text-align: center;
      }

      .session-boot-spinner {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 3px solid color-mix(in srgb, var(--brand) 22%, transparent);
        border-top-color: var(--brand);
        animation: sessionBootSpin 0.75s linear infinite;
      }

      @keyframes sessionBootSpin {
        to {
          transform: rotate(360deg);
        }
      }

      .session-boot-text {
        margin: 0;
        font-size: 14px;
        color: var(--text-sub);
        letter-spacing: 0.02em;
      }

      .top-actions {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 40;
        display: flex;
        justify-content: flex-end;
      }

      .top-actions-bar {
        display: flex;
        align-items: center;
        flex-wrap: nowrap;
        gap: 0;
        min-height: 48px;
        padding: 5px 6px 5px 5px;
        border-radius: 14px;
        border: 1px solid var(--stroke);
        background: var(--glass-strong);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow:
          0 10px 32px color-mix(in srgb, var(--text-main) 8%, transparent),
          0 0 0 1px var(--shell-inner) inset;
      }

      .top-actions-sep {
        width: 1px;
        height: 26px;
        margin: 0 2px 0 6px;
        align-self: center;
        flex-shrink: 0;
        border-radius: 1px;
        background: var(--section-divider);
      }

      .top-actions-bar:has(#userBadge.hidden) .top-actions-sep {
        display: none;
      }

      .top-session-block {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 4px 0 2px;
        min-height: 38px;
      }

      .top-actions-bar:has(#userBadge.hidden) .top-session-block {
        display: none;
      }

      /* 仅展示：当前用户（非按钮，弱化边框与背景） */
      .user-display {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        max-width: min(220px, 42vw);
        min-height: 36px;
        padding: 2px 10px 2px 4px;
        border-radius: 10px;
        border: none;
        border-left: 3px solid color-mix(in srgb, var(--text-sub) 45%, transparent);
        background: color-mix(in srgb, var(--text-sub) 6%, transparent);
        color: var(--text-main);
        font-size: 13px;
        font-weight: 500;
        overflow: hidden;
        cursor: default;
        user-select: none;
      }

      .user-display-meta {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        gap: 1px;
        min-width: 0;
        flex: 1;
      }

      .user-display-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        width: 100%;
        max-width: 100%;
        line-height: 1.3;
        font-weight: 600;
        color: var(--text-main);
      }

      .user-display-role {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-sub);
        line-height: 1.2;
        white-space: nowrap;
      }

      .user-display-avatar {
        width: 28px;
        height: 28px;
        flex-shrink: 0;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 800;
        color: var(--text-sub);
        background: color-mix(in srgb, var(--text-sub) 14%, transparent);
        border: 1px solid color-mix(in srgb, var(--text-sub) 22%, transparent);
      }

      /* 可操作：退出登录（明确按钮态） */
      .top-logout-btn {
        height: 36px;
        padding: 0 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 650;
        white-space: nowrap;
        border: 1px solid color-mix(in srgb, var(--brand) 42%, transparent);
        background: linear-gradient(
          145deg,
          color-mix(in srgb, var(--brand) 16%, transparent),
          color-mix(in srgb, var(--brand-2) 11%, transparent)
        );
        color: var(--text-main);
        cursor: pointer;
        box-shadow: 0 2px 12px color-mix(in srgb, var(--brand) 14%, transparent);
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease,
          transform 0.08s ease,
          filter 0.2s ease;
      }

      .top-logout-btn:hover {
        border-color: color-mix(in srgb, var(--brand) 60%, transparent);
        filter: brightness(1.07);
        box-shadow: 0 4px 18px color-mix(in srgb, var(--brand) 22%, transparent);
      }

      .top-logout-btn:focus-visible {
        outline: 2px solid var(--field-focus);
        outline-offset: 2px;
      }

      .top-logout-btn:active {
        transform: scale(0.98);
      }

      /* 主题切换：可操作图标按钮（与展示区分） */
      .top-bar-icon-btn:focus-visible {
        outline: 2px solid var(--field-focus);
        outline-offset: 2px;
      }

      /* 主题确认对话框 */
      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 1100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
        background: color-mix(in srgb, #0a0c12 72%, transparent);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        opacity: 1;
        transition: opacity 0.2s ease;
      }

      body[data-theme="light"] .modal-overlay {
        background: color-mix(in srgb, #1d2534 35%, transparent);
      }

      .modal-overlay.hidden {
        display: none !important;
        pointer-events: none;
      }

      .modal-dialog {
        width: 100%;
        max-width: 400px;
        border-radius: 16px;
        border: 1px solid var(--stroke);
        background: var(--glass-strong);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        padding: 22px 22px 18px;
        box-shadow: var(--shadow-xl), 0 0 0 1px var(--shell-inner) inset;
      }

      .modal-title {
        margin: 0 0 10px;
        font-size: 17px;
        font-weight: 750;
        color: var(--text-main);
        letter-spacing: 0.02em;
      }

      .modal-desc {
        margin: 0 0 22px;
        font-size: 14px;
        line-height: 1.55;
        color: var(--text-sub);
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        flex-wrap: wrap;
      }

      .modal-btn {
        min-width: 88px;
        height: 40px;
        padding: 0 18px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 650;
        cursor: pointer;
        border: 1px solid transparent;
        transition:
          filter 0.18s ease,
          transform 0.08s ease,
          box-shadow 0.18s ease,
          border-color 0.18s ease;
      }

      .modal-btn:focus-visible {
        outline: 2px solid var(--field-focus);
        outline-offset: 2px;
      }

      .modal-btn:active {
        transform: scale(0.98);
      }

      .modal-btn-cancel {
        border-color: color-mix(in srgb, var(--text-sub) 35%, transparent);
        background: color-mix(in srgb, var(--text-sub) 8%, transparent);
        color: var(--text-main);
      }

      .modal-btn-cancel:hover {
        border-color: color-mix(in srgb, var(--text-sub) 50%, transparent);
        background: color-mix(in srgb, var(--text-sub) 14%, transparent);
      }

      .modal-btn-confirm {
        border-color: var(--button-border);
        background:
          linear-gradient(90deg, var(--button-overlay-1), var(--button-overlay-2)),
          linear-gradient(135deg, var(--brand) 0%, var(--brand-2) 100%);
        color: #fff;
        box-shadow: 0 6px 18px var(--button-shadow-1);
      }

      .modal-btn-confirm:hover {
        filter: brightness(1.06);
        box-shadow: 0 8px 22px var(--button-shadow-hover-1);
      }

      .modal-btn-danger {
        border-color: color-mix(in srgb, var(--error-text) 45%, transparent);
        background: linear-gradient(
          145deg,
          color-mix(in srgb, var(--error-text) 22%, transparent),
          color-mix(in srgb, var(--error-text) 12%, transparent)
        );
        color: var(--error-text);
        box-shadow: 0 4px 16px color-mix(in srgb, var(--error-text) 15%, transparent);
      }

      .modal-btn-danger:hover {
        filter: brightness(1.08);
        border-color: color-mix(in srgb, var(--error-text) 60%, transparent);
      }

      .hidden {
        display: none !important;
      }

      .auth-view {
        max-width: 460px;
        margin: 12px auto 4px;
        border-radius: 12px;
        background: transparent;
        border: none;
        box-shadow: none;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        padding: 20px 10px 14px;
      }

      .auth-title {
        margin: 0;
        font-size: 30px;
        line-height: 1.2;
        letter-spacing: 0.4px;
        font-weight: 780;
        color: var(--text-main);
        text-shadow: none;
      }

      .auth-sub {
        margin: 12px 0 0;
        color: var(--text-sub);
        font-size: 14px;
      }

      .auth-grid {
        margin-top: 22px;
        display: grid;
        gap: 12px;
      }

      .field {
        height: 48px;
        display: flex;
        align-items: center;
        gap: 10px;
        border: 1px solid var(--field-border);
        border-radius: 10px;
        background: var(--field-bg);
        padding: 0 12px;
        transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
      }

      .field:focus-within {
        border-color: var(--field-focus);
        box-shadow:
          0 0 0 2px var(--field-focus-ring),
          0 0 18px var(--field-focus-glow);
        transform: translateY(-1px);
      }

      .field svg {
        width: 17px;
        height: 17px;
        color: var(--field-icon);
        flex: 0 0 17px;
      }

      .field input {
        width: 100%;
        border: none;
        outline: none;
        background: transparent;
        color: var(--field-text);
        font-size: 14px;
      }

      .field input::placeholder {
        color: var(--field-placeholder);
      }

      .field input:-webkit-autofill,
      .field input:-webkit-autofill:hover,
      .field input:-webkit-autofill:focus,
      .field input:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0 1000px transparent inset !important;
        box-shadow: 0 0 0 1000px transparent inset !important;
        -webkit-text-fill-color: var(--field-text) !important;
        transition: background-color 9999s ease-out 0s;
      }

      .field.with-action {
        padding-right: 8px;
      }

      /* 密码行：输入区域与容器均为透明，避免浏览器默认底色 */
      .field.password-field {
        background: transparent !important;
        background-color: transparent !important;
      }

      .field.password-field input#passwordInput {
        background: transparent !important;
        background-color: transparent !important;
        -webkit-appearance: none;
        appearance: none;
      }

      .field.password-field input#passwordInput:-webkit-autofill,
      .field.password-field input#passwordInput:-webkit-autofill:hover,
      .field.password-field input#passwordInput:-webkit-autofill:focus,
      .field.password-field input#passwordInput:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0) inset !important;
        box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0) inset !important;
        -webkit-text-fill-color: var(--field-text) !important;
        transition: background-color 9999s ease-out 0s;
      }

      .field-action {
        border: none;
        background: transparent;
        color: var(--field-icon);
        width: 30px;
        height: 30px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .field-action:hover {
        background: color-mix(in srgb, var(--brand) 16%, transparent);
      }

      .field-action svg {
        width: 17px;
        height: 17px;
      }

      .auth-meta {
        margin-top: 2px;
        display: flex;

      function syncBatchDownloadButton() {
        if (!batchDownloadBtn) return;
        const n = selectedJobIds.size;
        batchDownloadBtn.disabled = n <= 0;
        batchDownloadBtn.textContent = n > 0 ? ("批量下载（" + n + "）") : "批量下载";
      }

      function formatSupportedFormatsLine(allowedTypes) {
        const types = new Set(
          (Array.isArray(allowedTypes) ? allowedTypes : [])
            .map((x) => String(x || "").trim().toLowerCase())
            .filter(Boolean)
            .map((x) => (x.startsWith(".") ? x.slice(1) : x))
        );
        const parts = [];
        if (types.has("pdf")) parts.push("PDF");
        if (types.has("doc") || types.has("docx")) parts.push("Word");
        if (types.has("ppt") || types.has("pptx")) parts.push("PPT");
        if (types.has("xls") || types.has("xlsx")) parts.push("Excel");
        if (types.has("html") || types.has("htm")) parts.push("HTML");
        const imgExts = ["png", "jpg", "jpeg", "tif", "tiff", "bmp", "webp"];
        if (imgExts.some((x) => types.has(x))) parts.push("图片");
        if (!parts.length) return "支持多格式智能解析";
        return "支持 " + parts.join(" / ") + " 智能解析";
      }

      async function initSupportedFormatsLine() {
        if (!supportedFormatsLine) return;
        try {
          const resp = await fetch("/app/config", {
            credentials: "same-origin",
            cache: "no-store",
          });
          if (!resp.ok) {
            supportedFormatsLine.textContent = formatSupportedFormatsLine(null);
            return;
          }
          const data = await resp.json();
          supportedFormatsLine.textContent = formatSupportedFormatsLine(data.allowed_types);
        } catch (e) {
          supportedFormatsLine.textContent = formatSupportedFormatsLine(null);
        }
      }

      const TASK_PAGE_SIZES = [10, 20, 50];

      function normalizeTaskPageSize(value) {
        const n = Number(value);
        if (!Number.isFinite(n) || n <= 0) return TASK_PAGE_SIZES[0];
        let best = TASK_PAGE_SIZES[0];
        let bestDiff = Math.abs(n - best);
        for (let i = 1; i < TASK_PAGE_SIZES.length; i++) {
          const s = TASK_PAGE_SIZES[i];
          const diff = Math.abs(n - s);
          if (diff < bestDiff) {
            best = s;
            bestDiff = diff;
          }
        }
        return best;
      }

      function updateConvertButtonState() {
  convertBtn.disabled = !currentFiles || currentFiles.length === 0;
}



      function formatBytes(n) {
        const x = Number(n);
        if (!Number.isFinite(x) || x < 0) return "0 B";
        if (x < 1024) return x + " B";
        if (x < 1048576) return (x / 1024).toFixed(1) + " KB";
        return (x / 1048576).toFixed(1) + " MB";
      }

      /** 根据秒数格式化为中文剩余时间文案（用于上传 ETA） */
      function formatEtaSeconds(sec) {
        const s = Number(sec);
        if (!Number.isFinite(s) || s <= 0) return "";
        const ceil = Math.ceil(s);
        if (ceil < 60) return ceil + " 秒";
        if (ceil < 3600) {
          const m = Math.floor(ceil / 60);
          const rs = ceil % 60;
          if (rs === 0) return m + " 分钟";
          return m + " 分 " + rs + " 秒";
        }
        const h = Math.floor(ceil / 3600);
        const m = Math.floor((ceil % 3600) / 60);
        if (m === 0) return h + " 小时";
        return h + " 小时 " + m + " 分";
      }

      /**
       * 用已传字节与耗时估算剩余时间；起步阶段返回空串避免抖动。
       * @returns {string} 如 " · 剩余约 12 秒"，无可估算时 ""
       */
      function formatUploadEta(loaded, total, elapsedSec) {
        const L = Number(loaded);
        const T = Number(total);
        const elapsed = Number(elapsedSec);
        if (!Number.isFinite(L) || !Number.isFinite(T) || T <= 0 || L <= 0 || L >= T) {
          return "";
        }
        if (!Number.isFinite(elapsed) || elapsed < 0.45) {
          return "";
        }
        const speed = L / elapsed;
        if (speed < 200) {
          return "";
        }
        const etaSec = (T - L) / speed;
        if (!Number.isFinite(etaSec) || etaSec < 0.5) {
          return "";
        }
        if (etaSec > 48 * 3600) {
          return " · 剩余超过 48 小时";
        }
        return " · 剩余约 " + formatEtaSeconds(etaSec);
      }

      function resetProgressBar() {
        progressWrap.classList.remove("progress-upload");
        progressWrap.classList.remove("progress-has-pct");
        if (progressFill) progressFill.style.width = "0%";
        if (progressTrack) {
          progressTrack.setAttribute("aria-valuenow", "0");
        }
        if (progressElapsedLine) {
          progressElapsedLine.textContent = "";
          progressElapsedLine.hidden = true;
        }
      }

      function setStatus(type, text) {
        if (type === "loading") {
          statusBox.className = "status-box";
          resetProgressBar();
          progressWrap.classList.add("show");
          const progressText = progressWrap.querySelector(".progress-text");
          progressText.textContent = text || "正在解析文档，请稍候...";
          return;
        }

        if (type === "success") {
          statusBox.className = "status-box";
          showToast("success", text);
          return;
        }

        // error
        statusBox.className = "status-box show status-error";
        statusBox.innerHTML = "✖ " + text;
      }

      function showToast(type, text) {
        if (!toast) return;
        if (toastTimer) {
          clearTimeout(toastTimer);
          toastTimer = null;
        }
        toast.className = "toast show " + (type === "success" ? "toast-success" : "toast-error");
        toast.textContent = (type === "success" ? "✔ " : "✖ ") + text;
        toastTimer = setTimeout(() => {
          toast.className = "toast";
          toast.textContent = "";
        }, 3000);
      }

      /**
       * 主题化确认框（替代浏览器 confirm）。opts: title, message, confirmText, cancelText, danger
       * @returns {Promise<boolean>}
       */
      function openThemedConfirm(opts) {
        opts = opts || {};
        return new Promise(function (resolve) {
          if (!confirmModal || !confirmModalOk || !confirmModalCancel) {
            resolve(false);
            return;
          }
          var title = opts.title != null ? opts.title : "确认";
          var message = opts.message != null ? opts.message : "";
          var confirmText = opts.confirmText != null ? opts.confirmText : "确定";
          var cancelText = opts.cancelText != null ? opts.cancelText : "取消";
          var danger = !!opts.danger;
          var prevActive = document.activeElement;
          var settled = false;

          confirmModalTitle.textContent = title;
          confirmModalDesc.textContent = message;
          confirmModalOk.textContent = confirmText;
          confirmModalCancel.textContent = cancelText;

          confirmModalOk.classList.remove("modal-btn-confirm", "modal-btn-danger");
          if (danger) {
            confirmModalOk.classList.add("modal-btn-danger");
          } else {
            confirmModalOk.classList.add("modal-btn-confirm");
          }

          function finish(result) {
            if (settled) {
              return;
            }
            settled = true;
            document.removeEventListener("keydown", onDocKey);
            confirmModalOk.onclick = null;
            confirmModalCancel.onclick = null;
            confirmModal.onclick = null;
            confirmModal.classList.add("hidden");
            confirmModal.setAttribute("hidden", "");
            if (prevActive && typeof prevActive.focus === "function") {
              try {
                prevActive.focus();
              } catch (e) {
                /* ignore */
              }
            }
            resolve(result);
          }

          function onDocKey(e) {
            if (e.key === "Escape") {
              e.preventDefault();
              finish(false);
            }
          }

          confirmModalOk.onclick = function () {

      function getFileRelativePath(file, mode) {
  if (!file) return "";
  if (mode === "folder") {
    return file.webkitRelativePath || file._relativePath || file.name || "";

}

      function statusLabel(status) {
        const map = {
          queued: "排队中",
          running: "转换中",
          succeeded: "已完成",
          failed: "失败",
          cancelled: "已取消",
        };

      function formatTime(iso) {
        if (!iso) return "—";
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return iso;
        return d.toLocaleString("zh-CN", { hour12: false });
      }

      function parseIsoMs(iso) {
        if (!iso) return null;
        const d = new Date(iso);
        const t = d.getTime();
        return Number.isNaN(t) ? null : t;
      }

      /** 毫秒 → 中文耗时，如「45秒」「3分12秒」「1小时5分」 */
      function formatDurationZh(ms) {
        const n = Number(ms);
        if (!Number.isFinite(n) || n < 0) return "0秒";
        const sec = Math.floor(n / 1000);
        if (sec < 60) return sec + "秒";
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        if (m < 60) {
          return s === 0 ? m + "分钟" : m + "分" + s + "秒";
        }
        const h = Math.floor(m / 60);
        const rm = m % 60;
        if (rm === 0) return h + "小时";
        return h + "小时" + rm + "分";
      }

      /** 已完成任务：总耗时（提交→结束）+ 若有开始时间则附加处理耗时 */
      function totalDurationMetaLine(job) {
        const term = { succeeded: 1, failed: 1, cancelled: 1 };
        if (!term[job.status] || !job.finished_at || !job.created_at) return "";
        const c = parseIsoMs(job.created_at);
        const f = parseIsoMs(job.finished_at);
        if (c == null || f == null || f < c) return "";
        let out = " · 总耗时 " + formatDurationZh(f - c);
        const st = parseIsoMs(job.started_at);
        if (st != null && f >= st) {
          out += " · 处理 " + formatDurationZh(f - st);
        }
        return out;
      }

      function escapeAttr(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;");
      }

      function updateLiveElapsedSpans() {
        document.querySelectorAll(".task-live-elapsed").forEach(function (el) {
          const c = el.getAttribute("data-created-at");
          const s = el.getAttribute("data-started-at");
          const st = el.getAttribute("data-st");
          const pctStr = el.getAttribute("data-progress-percent");
          const t0 = parseIsoMs(c);
          if (t0 == null) {
            el.textContent = "";
            return;
          }
          const now = Date.now();
          let txt = "已用时 " + formatDurationZh(now - t0);
          const t1 = parseIsoMs(s);
          if (t1 != null && st === "running") {
            const processingMs = now - t1;
            txt += " · 处理 " + formatDurationZh(processingMs);

            const pct = parseFloat(pctStr);
            if (Number.isFinite(pct) && pct > 1 && pct < 100) {
              const estimatedTotal = processingMs / (pct / 100);
              const remaining = estimatedTotal - processingMs;
              if (remaining > 1000) {
                txt += " · 预计剩余 " + formatDurationZh(remaining);
              }
            }
          }
          el.textContent = txt;
        });
      }

      function ensureLiveElapsedTicker(items) {
        const hasActive = (items || []).some(function (j) {
          return j.status === "queued" || j.status === "running";
        });
        if (hasActive) {
          updateLiveElapsedSpans();
          if (!liveElapsedInterval) {
            liveElapsedInterval = setInterval(updateLiveElapsedSpans, 1000);
          }
        } else if (liveElapsedInterval) {
          clearInterval(liveElapsedInterval);
          liveElapsedInterval = null;
        }
      }

      function syncTaskPager() {
        if (taskPageSizeSelect) {
          const raw = Number(taskPageSizeSelect.value);
          if (Number.isFinite(raw) && raw > 0) {
            taskPageSize = normalizeTaskPageSize(raw);
          }
          taskPageSizeSelect.value = String(taskPageSize);
        }
        taskPage = Math.max(1, Math.floor(Number(taskPage) || 1));
        taskTotal = Math.max(0, Math.floor(Number(taskTotal) || 0));
        const totalPages = taskPageSize > 0 ? Math.max(1, Math.ceil(taskTotal / taskPageSize)) : 1;
        if (taskPage > totalPages) taskPage = totalPages;
        if (taskPrevBtn) taskPrevBtn.disabled = taskPage <= 1;
        if (taskNextBtn) taskNextBtn.disabled = taskPage >= totalPages;
        if (taskPageLabel) {
          taskPageLabel.textContent =
            "第 " + taskPage + " 页" + (taskTotal ? " · 共 " + taskTotal + " 条" : "");
        }

      async function refreshTaskList(opts) {
        opts = opts || {};
        if (!currentUser) {
          historyWrap.classList.remove("show");
          historyList.innerHTML = "";
          return;
        }
        if (opts.page_size != null) {
          const ps = Number(opts.page_size);
          if (Number.isFinite(ps) && ps > 0) {
            taskPageSize = normalizeTaskPageSize(ps);
          }
        }
        if (opts.page != null) {
          const p = Number(opts.page);
          if (Number.isFinite(p) && p > 0) {
            taskPage = Math.max(1, Math.floor(p));
          }
        }
        if (opts.resetPage) {
          taskPage = 1;
        }
        syncTaskPager();
        if (!opts.silent) {
          historyWrap.classList.add("show");
          historyList.innerHTML =
            '<p class="history-meta" style="margin:0;color:var(--text-sub)">加载任务列表…</p>';
        }
        try {
          const params = new URLSearchParams();
          params.set("page", String(taskPage));
          params.set("page_size", String(taskPageSize));
          if (taskSearchQuery) {
            params.set("q", taskSearchQuery);
          }
          if (currentUser.role === "admin") {
            if (taskOwnerFilter.value) params.set("owner", taskOwnerFilter.value);
            if (taskStatusFilter.value) params.set("status", taskStatusFilter.value);
          }
          const resp = await fetch("/jobs?" + params.toString(), {
            credentials: "same-origin",
            cache: "no-store",
          });
          if (resp.status === 401) {
            setAuthState(null);
            return;
          }
          const data = await resp.json();
          if (!resp.ok) {
            if (!opts.silent) showToast("error", data.detail || "加载任务失败");
            if (!opts.silent) {
              historyWrap.classList.add("show");
              historyList.innerHTML =
                '<p class="history-meta" style="margin:0">加载失败，请稍后点击「刷新」重试。</p>';
            }
            return;
          }
          renderTaskItems(data.items || []);
          updateTaskPollingFromItems(data.items || []);
          taskPage = Number(data.page) || taskPage;
          taskPageSize = normalizeTaskPageSize(data.page_size);
          taskTotal = Number(data.total) || 0;
          syncTaskPager();
        } catch (e) {
          if (!opts.silent) showToast("error", "加载任务列表失败");
          if (!opts.silent) {
            historyWrap.classList.add("show");
            historyList.innerHTML =
              '<p class="history-meta" style="margin:0">加载失败，请稍后点击「刷新」重试。</p>';
          }

      async function readAllDirectoryEntries(dirReader) {
    const entries = [];
    while (true) {
      const batch = await new Promise((resolve, reject) => {
        dirReader.readEntries(resolve, reject);
      });
      if (!batch || !batch.length) {
        break;
      }
      entries.push(...batch);
    }
    return entries;
  }

  async function walkEntry(entry, pathPrefix) {
    if (!entry) return [];

    if (entry.isFile) {
      const file = await new Promise((resolve, reject) => {
        entry.file(resolve, reject);
      });

      const relPath = pathPrefix ? (pathPrefix + "/" + file.name) : file.name;

      try {
        Object.defineProperty(file, "webkitRelativePath", {
          value: relPath,
          configurable: true,
        });
      } catch (e) {
        file._relativePath = relPath;
      }

      if (!file._relativePath) {
        file._relativePath = relPath;
      }

      return [file];
    }

    if (entry.isDirectory) {
      const dirPath = pathPrefix ? (pathPrefix + "/" + entry.name) : entry.name;
      const reader = entry.createReader();
      const children = await readAllDirectoryEntries(reader);

      let files = [];
      for (const child of children) {
        const subFiles = await walkEntry(child, dirPath);
        files = files.concat(subFiles);
      }
      return files;
    }

    return [];
  }

async function extractDroppedFiles(dataTransfer) {
  if (!dataTransfer) {
    return { mode: "file", files: [] };
  }

  const items = Array.from(dataTransfer.items || []);
  const hasEntryApi = items.some(
    (item) => item && typeof item.webkitGetAsEntry === "function"
  );

  if (!hasEntryApi) {
    return {
      mode: "file",
      files: Array.from(dataTransfer.files || []),
    };
  }

  let allFiles = [];
  let hasDirectory = false;

  for (const item of items) {
    if (!item || item.kind !== "file") continue;

    const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
    if (!entry) continue;

    if (entry.isDirectory) {
      hasDirectory = true;
    }

    const files = await walkEntry(entry, "");
    allFiles = allFiles.concat(files);
  }

  return {
    mode: hasDirectory ? "folder" : "file",
    files: allFiles,
  };
}

      function postJobsWithUploadProgress(formData, myGen, totalBytes) {
        const progressText = progressWrap.querySelector(".progress-text");
        return new Promise(function (resolve, reject) {
          const xhr = new XMLHttpRequest();
          xhr.open("POST", "/jobs");
          xhr.withCredentials = true;
          uploadXhr = xhr;
          let uploadT0 = 0;
          xhr.upload.addEventListener("progress", function (e) {
            if (myGen !== uploadGeneration) {
              return;
            }
            const fileSize = typeof totalBytes === "number"
              ? totalBytes
              : (currentFiles || []).reduce(function (sum, f) {
  return sum + (f && f.size ? f.size : 0);
}, 0);

            const total =
              e.lengthComputable && e.total > 0 ? e.total : fileSize > 0 ? fileSize : 0;
            const elapsedSec = uploadT0 > 0 ? (performance.now() - uploadT0) / 1000 : 0;
            if (total > 0 && progressFill) {
              progressWrap.classList.add("progress-upload");
              const pct = Math.min(100, Math.round((e.loaded / total) * 100));
              progressFill.style.width = pct + "%";
              if (progressTrack) {
                progressTrack.setAttribute("aria-valuenow", String(pct));
              }
              const eta = formatUploadEta(e.loaded, total, elapsedSec);
              progressText.textContent =
                "上传中 " +
                pct +
                "%（" +
                formatBytes(e.loaded) +
                " / " +
                formatBytes(total) +
                "）" +
                eta;
            } else {
              progressWrap.classList.remove("progress-upload");
              if (progressFill) progressFill.style.width = "0%";
              if (progressTrack) progressTrack.setAttribute("aria-valuenow", "0");
              progressText.textContent = "上传中… " + formatBytes(e.loaded);
            }
          });
          xhr.onload = function () {
            if (uploadXhr === xhr) uploadXhr = null;
            if (myGen !== uploadGeneration) {
              return;
            }
            let payload = null;
            try {
              payload = xhr.responseText ? JSON.parse(xhr.responseText) : null;
            } catch (err) {
              payload = { detail: xhr.responseText || "响应解析失败" };
            }
            resolve({ ok: xhr.status >= 200 && xhr.status < 300, status: xhr.status, payload: payload });
          };
          xhr.onerror = function () {
            if (uploadXhr === xhr) uploadXhr = null;
            if (myGen !== uploadGeneration) {
              return;
            }
            reject(new Error("network"));
          };
          xhr.onabort = function () {
            if (uploadXhr === xhr) uploadXhr = null;
            if (myGen !== uploadGeneration) {
              return;
            }
            reject(new Error("aborted"));
          };
          uploadT0 = performance.now();
          xhr.send(formData);
        });
      }

                "开始上传（" + (i + 1) + "/" + currentFiles.length + "）…";
              if (progressFill) progressFill.style.width = "0%";
              if (progressTrack) progressTrack.setAttribute("aria-valuenow", "0");

              const formData = new FormData();
              formData.append("files", f);
              formData.append("relative_paths", f.name);
              formData.append("upload_kind", "file");
              formData.append("root_name", "");

              const { ok, status, payload } = await postJobsWithUploadProgress(formData, myGen, f.size || 0);
              if (status === 401) {
                setAuthState(null);
                setStatus("error", "登录已失效，请重新登录");
                resetProgressBar();
                progressWrap.classList.remove("show");
                return;
              }
              if (!ok) {
                console.error("create job failed:", status, payload);
                failedUploads.push({
                  name: f.name,
                  detail: (payload && payload.detail) || ("创建任务失败，HTTP " + status),
                });
                continue;
              }
              const jobId = payload && payload.job_id;
              if (jobId) {
                jobIds.push(jobId);
              } else {
                failedUploads.push({ name: f.name, detail: "未返回任务 ID" });
              }
            }
          }

          if (myGen !== uploadGeneration) {
            return;
          }
          // 上传请求已经结束：进入任务创建/轮询阶段，不再需要「取消上传」按钮。
          if (uploadCancelBtn) {
            uploadCancelBtn.hidden = true;
            uploadCancelBtn.disabled = false;
          }
          resetProgressBar();
          progressWrap.classList.remove("show");

        await refreshTaskList();
        clearCurrentSelection();

          if (jobIds.length) {
            setStatus("success", "任务已创建，正在后台处理");
            for (const jobId of jobIds) {
              pollJobUntilTerminal(jobId, myGen);
            }
          } else {
            setStatus("error", "未创建任何任务");
            resetProgressBar();
            progressWrap.classList.remove("show");
            return;
          }

          if (!failedUploads.length) {
            showToast("success", "已提交 " + jobIds.length + " 个任务");
          } else if (jobIds.length) {
            showToast("warn", "已提交 " + jobIds.length + " 个任务，失败 " + failedUploads.length + " 个");
          } else {
            showToast("error", "上传失败 " + failedUploads.length + " 个文件");
          }

        } catch (error) {
          if (myGen === uploadGeneration) {
            const message = String((error && error.message) || "");
            if (message === "aborted") {
              setStatus("success", "已取消上传");
              resetProgressBar();
              progressWrap.classList.remove("show");
            } else {
              console.error("upload failed:", error);
setStatus("error", "请求失败：" + (error && error.message ? error.message : "未知错误"));

              resetProgressBar();
              progressWrap.classList.remove("show");
            }
          }
        } finally {
          convertBtn.textContent = oldText;
          if (uploadCancelBtn) {
            uploadCancelBtn.hidden = true;
            uploadCancelBtn.disabled = false;
          }
          updateConvertButtonState();
        }
      }

      convertBtn.addEventListener("click", uploadAndConvert);
      if (uploadCancelBtn) {
        uploadCancelBtn.addEventListener("click", async () => {
          if (!uploadXhr) return;
          const okCancel = await openThemedConfirm({
            title: "取消上传",
            message: "确定取消当前上传吗？取消后不会创建转换任务。",
            confirmText: "确认取消",
            cancelText: "返回",
            danger: true,
          });
          if (!okCancel) return;
          if (uploadCancelBtn) uploadCancelBtn.disabled = true;
          try {
            uploadXhr.abort();
          } catch (e) {
            /* ignore */
          }
        });
      }
      initSupportedFormatsLine();
      applyTheme(localStorage.getItem(STORAGE_KEYS.theme) || "light");
      const rememberedUser = localStorage.getItem(STORAGE_KEYS.rememberedUser) || "";
      if (rememberedUser) {
        usernameInput.value = rememberedUser;
        rememberMeInput.checked = true;
      }
      updateConvertButtonState();

      (async function initAuth() {
        try {
          const resp = await fetch("/auth/bootstrap", {
            credentials: "same-origin",
            cache: "no-store",
          });
          let payload = null;
          if (resp.ok) {
            payload = await resp.json();
          }
          if (sessionBoot) sessionBoot.classList.add("hidden");
          if (!resp.ok) {
            setAuthState(null);
            return;
          }
          setAuthState(
            { username: payload.username, role: payload.role },
            { initialJobs: payload.jobs }
          );
        } catch (error) {
          if (sessionBoot) sessionBoot.classList.add("hidden");
          setAuthState(null);
        }
      })();
    </script>
  </body>
</html>
