          <button type="button" class="modal-btn modal-btn-confirm" id="confirmModalOk">确定</button>
        </div>
      </div>
    </div>

    <script>
      const fileInput = document.getElementById("fileInput");
      const dropzone = document.getElementById("dropzone");
      const selectedFile = document.getElementById("selectedFile");
      const convertBtn = document.getElementById("convertBtn");
      const progressWrap = document.getElementById("progressWrap");
      const progressTrack = document.getElementById("progressTrack");
      const progressFill = document.getElementById("progressFill");
      const progressElapsedLine = document.getElementById("progressElapsedLine");
      const uploadCancelBtn = document.getElementById("uploadCancelBtn");
      const statusBox = document.getElementById("statusBox");
      const result = document.getElementById("result");
      const resultFilename = document.getElementById("resultFilename");
      const downloadBtn = document.getElementById("downloadBtn");
      const toast = document.getElementById("toast");
      const confirmModal = document.getElementById("confirmModal");
      const confirmModalTitle = document.getElementById("confirmModalTitle");
      const confirmModalDesc = document.getElementById("confirmModalDesc");
      const confirmModalOk = document.getElementById("confirmModalOk");
      const confirmModalCancel = document.getElementById("confirmModalCancel");
      const dropzoneText = dropzone.querySelector(".dropzone-text");
      const dropzoneHint = dropzone.querySelector(".dropzone-hint");
      const defaultDropzoneText = dropzoneText ? dropzoneText.textContent : "";
      const defaultDropzoneHint = dropzoneHint ? dropzoneHint.textContent : "";
      const themeToggle = document.getElementById("themeToggle");
      const historyWrap = document.getElementById("history");
      const historyList = document.getElementById("historyList");
      const refreshTasksBtn = document.getElementById("refreshTasksBtn");
      const taskFilters = document.getElementById("taskFilters");
      const taskOwnerFilter = document.getElementById("taskOwnerFilter");
      const taskStatusFilter = document.getElementById("taskStatusFilter");
      const applyTaskFiltersBtn = document.getElementById("applyTaskFiltersBtn");
      const authBox = document.getElementById("authBox");
      const workArea = document.getElementById("workArea");
      const mainShell = document.getElementById("mainShell");
      const userBadge = document.getElementById("userBadge");
      const logoutBtn = document.getElementById("logoutBtn");
      const loginBtn = document.getElementById("loginBtn");
      const usernameInput = document.getElementById("usernameInput");
      const passwordInput = document.getElementById("passwordInput");
      const passwordToggle = document.getElementById("passwordToggle");
      const rememberMeInput = document.getElementById("rememberMe");
      const forgotPasswordLink = document.getElementById("forgotPasswordLink");

      const STORAGE_KEYS = {
        theme: "docling_theme",
        history: "docling_history",
        rememberedUser: "docling_remembered_user",
      };
      let currentFile = null;
      let currentUser = null;
      let taskPollTimer = null;
      /** 任务列表中排队/进行中项的「已用时」每秒刷新 */
      let liveElapsedInterval = null;
      /** 每次点击上传自增，用于丢弃过期的 pollJobUntilTerminal，避免多次上传互相覆盖 UI */
      let uploadGeneration = 0;
      /** 正在进行中的上传 XHR（用于点击「取消上传」时 abort） */
      let uploadXhr = null;

      let toastTimer = null;
      let windowDragDepth = 0;

      function updateConvertButtonState() {
        convertBtn.disabled = !currentFile;
      }

      function formatBytes(n) {
        const x = Number(n);
        if (!Number.isFinite(x) || x < 0) return "0 B";
        if (x < 1024) return x + " B";
        if (x < 1048576) return (x / 1024).toFixed(1) + " KB";
        return (x / 1048576).toFixed(1) + " MB";
      }

      /** 根据秒数格式化为中文剩余时间文案（用于上传 ETA） */
      function formatEtaSeconds(sec) {
        const s = Number(sec);
        if (!Number.isFinite(s) || s <= 0) return "";
        const ceil = Math.ceil(s);
        if (ceil < 60) return ceil + " 秒";
        if (ceil < 3600) {
          const m = Math.floor(ceil / 60);
          const rs = ceil % 60;
          if (rs === 0) return m + " 分钟";
          return m + " 分 " + rs + " 秒";
        }
        const h = Math.floor(ceil / 3600);
        const m = Math.floor((ceil % 3600) / 60);
        if (m === 0) return h + " 小时";
        return h + " 小时 " + m + " 分";
      }

      /**
       * 用已传字节与耗时估算剩余时间；起步阶段返回空串避免抖动。
       * @returns {string} 如 " · 剩余约 12 秒"，无可估算时 ""
       */
      function formatUploadEta(loaded, total, elapsedSec) {
        const L = Number(loaded);
        const T = Number(total);
        const elapsed = Number(elapsedSec);
        if (!Number.isFinite(L) || !Number.isFinite(T) || T <= 0 || L <= 0 || L >= T) {
          return "";
        }
        if (!Number.isFinite(elapsed) || elapsed < 0.45) {
          return "";
        }
        const speed = L / elapsed;
        if (speed < 200) {
          return "";
        }
        const etaSec = (T - L) / speed;
        if (!Number.isFinite(etaSec) || etaSec < 0.5) {
          return "";
        }
        if (etaSec > 48 * 3600) {
          return " · 剩余超过 48 小时";
        }
        return " · 剩余约 " + formatEtaSeconds(etaSec);
      }

      function resetProgressBar() {
        progressWrap.classList.remove("progress-upload");
        progressWrap.classList.remove("progress-has-pct");
        if (progressFill) progressFill.style.width = "0%";
        if (progressTrack) {
          progressTrack.setAttribute("aria-valuenow", "0");
        }
        if (progressElapsedLine) {
          progressElapsedLine.textContent = "";
          progressElapsedLine.hidden = true;
        }
      }

      function setStatus(type, text) {
        if (type === "loading") {
          statusBox.className = "status-box";
          resetProgressBar();
          progressWrap.classList.add("show");
          const progressText = progressWrap.querySelector(".progress-text");
          progressText.textContent = text || "正在解析文档，请稍候...";
          return;
        }

        if (type === "success") {
          statusBox.className = "status-box";
          showToast("success", text);
          return;
        }

        // error
        statusBox.className = "status-box show status-error";
        statusBox.innerHTML = "✖ " + text;
      }

      function showToast(type, text) {
        if (!toast) return;
        if (toastTimer) {
          clearTimeout(toastTimer);
          toastTimer = null;
        }
        toast.className = "toast show " + (type === "success" ? "toast-success" : "toast-error");
        toast.textContent = (type === "success" ? "✔ " : "✖ ") + text;
        toastTimer = setTimeout(() => {
          toast.className = "toast";
          toast.textContent = "";
        }, 3000);
      }

      /**
       * 主题化确认框（替代浏览器 confirm）。opts: title, message, confirmText, cancelText, danger
       * @returns {Promise<boolean>}
       */
      function openThemedConfirm(opts) {
        opts = opts || {};
        return new Promise(function (resolve) {
          if (!confirmModal || !confirmModalOk || !confirmModalCancel) {
            resolve(false);
            return;
          }
          var title = opts.title != null ? opts.title : "确认";
          var message = opts.message != null ? opts.message : "";
          var confirmText = opts.confirmText != null ? opts.confirmText : "确定";
          var cancelText = opts.cancelText != null ? opts.cancelText : "取消";
          var danger = !!opts.danger;
          var prevActive = document.activeElement;
          var settled = false;

          confirmModalTitle.textContent = title;
          confirmModalDesc.textContent = message;
          confirmModalOk.textContent = confirmText;
          confirmModalCancel.textContent = cancelText;

          confirmModalOk.classList.remove("modal-btn-confirm", "modal-btn-danger");
          if (danger) {
            confirmModalOk.classList.add("modal-btn-danger");
          } else {
            confirmModalOk.classList.add("modal-btn-confirm");
          }

          function finish(result) {
            if (settled) {
              return;
            }
            settled = true;
            document.removeEventListener("keydown", onDocKey);
            confirmModalOk.onclick = null;
            confirmModalCancel.onclick = null;
            confirmModal.onclick = null;
            confirmModal.classList.add("hidden");
            confirmModal.setAttribute("hidden", "");
            if (prevActive && typeof prevActive.focus === "function") {
              try {
                prevActive.focus();
              } catch (e) {
                /* ignore */
              }
            }
            resolve(result);
          }

          function onDocKey(e) {
            if (e.key === "Escape") {
              e.preventDefault();
              finish(false);
            }
          }

          confirmModalOk.onclick = function () {
            finish(true);
          };
          confirmModalCancel.onclick = function () {
            finish(false);
          };
          confirmModal.onclick = function (e) {
            if (e.target === confirmModal) {
              finish(false);
            }
          };

          document.addEventListener("keydown", onDocKey);
          confirmModal.classList.remove("hidden");
          confirmModal.removeAttribute("hidden");
          (danger ? confirmModalCancel : confirmModalOk).focus();
        });
      }

      function setSelectedFile(file) {
        currentFile = file;
        selectedFile.classList.remove("hidden");
        selectedFile.textContent = "已选择文件: " + file.name;
        statusBox.className = "status-box";
        statusBox.textContent = "";
        updateConvertButtonState();
      }

      function resetResult() {
        result.classList.remove("show");
        resultFilename.textContent = "";
        downloadBtn.href = "#";
      }

      function stopTaskPolling() {
        if (taskPollTimer) {
          clearInterval(taskPollTimer);
          taskPollTimer = null;
        }
      }

      function setAuthState(user) {
        if (user) {
          currentUser = user;
          mainShell.classList.remove("login-shell");
          authBox.classList.add("hidden");
          workArea.classList.remove("hidden");
          userBadge.classList.remove("hidden");
          logoutBtn.classList.remove("hidden");
          const name = user.username || "用户";
          const avatar = name.slice(0, 1).toUpperCase();
          const roleHint = user.role === "admin" ? "（管理员）" : "";
          userBadge.innerHTML =
            '<span class="user-display-avatar" aria-hidden="true">' +
            avatar +
            '</span><span class="user-display-meta">' +
            '<span class="user-display-name">' +
            String(name).replace(/</g, "&lt;") +
            "</span>" +
            (roleHint
              ? '<span class="user-display-role">' +
                String(roleHint).replace(/</g, "&lt;") +
                "</span>"
              : "") +
            "</span>";
          if (user.role === "admin") {
            taskFilters.classList.remove("hidden");
            loadAdminUserFilters();
          } else {
            taskFilters.classList.add("hidden");
          }
          updateConvertButtonState();
          refreshTaskList();
          return;
        }
        stopTaskPolling();
        currentUser = null;
        mainShell.classList.add("login-shell");
        authBox.classList.remove("hidden");
        workArea.classList.add("hidden");
        userBadge.classList.add("hidden");
        logoutBtn.classList.add("hidden");
        userBadge.textContent = "未登录";
        taskFilters.classList.add("hidden");
        currentFile = null;
        selectedFile.classList.add("hidden");
        selectedFile.textContent = "";
        resetResult();
        progressWrap.classList.remove("show");
        historyWrap.classList.remove("show");
        historyList.innerHTML = "";
        updateConvertButtonState();
      }

      function applyTheme(theme) {
        document.body.setAttribute("data-theme", theme);
        if (theme === "dark") {
          themeToggle.innerHTML = '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M21 12.8A8.8 8.8 0 1 1 11.2 3a6.9 6.9 0 0 0 9.8 9.8Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path></svg>';
          themeToggle.setAttribute("aria-label", "切换亮色模式");
          themeToggle.setAttribute("title", "切换亮色模式");
          return;
        }
        themeToggle.innerHTML = '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.8"></circle><path d="M12 2.5V5M12 19V21.5M21.5 12H19M5 12H2.5M18.7 5.3L17 7M7 17L5.3 18.7M18.7 18.7L17 17M7 7L5.3 5.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path></svg>';
        themeToggle.setAttribute("aria-label", "切换暗色模式");
        themeToggle.setAttribute("title", "切换暗色模式");
      }

      function saveTheme(theme) {
        localStorage.setItem(STORAGE_KEYS.theme, theme);
        applyTheme(theme);
      }

      function statusLabel(status) {
        const map = {
          queued: "排队中",
          running: "转换中",
          succeeded: "已完成",
          failed: "失败",
          cancelled: "已取消",
        };
        return map[status] || status;
      }

      function formatTime(iso) {
        if (!iso) return "—";
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return iso;
        return d.toLocaleString("zh-CN", { hour12: false });
      }

      function parseIsoMs(iso) {
        if (!iso) return null;
        const d = new Date(iso);
        const t = d.getTime();
        return Number.isNaN(t) ? null : t;
      }

      /** 毫秒 → 中文耗时，如「45秒」「3分12秒」「1小时5分」 */
      function formatDurationZh(ms) {
        const n = Number(ms);
        if (!Number.isFinite(n) || n < 0) return "0秒";
        const sec = Math.floor(n / 1000);
        if (sec < 60) return sec + "秒";
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        if (m < 60) {
          return s === 0 ? m + "分钟" : m + "分" + s + "秒";
        }
        const h = Math.floor(m / 60);
        const rm = m % 60;
        if (rm === 0) return h + "小时";
        return h + "小时" + rm + "分";
      }

      /** 已完成任务：总耗时（提交→结束）+ 若有开始时间则附加处理耗时 */
      function totalDurationMetaLine(job) {
        const term = { succeeded: 1, failed: 1, cancelled: 1 };
        if (!term[job.status] || !job.finished_at || !job.created_at) return "";
        const c = parseIsoMs(job.created_at);
        const f = parseIsoMs(job.finished_at);
        if (c == null || f == null || f < c) return "";
        let out = " · 总耗时 " + formatDurationZh(f - c);
        const st = parseIsoMs(job.started_at);
        if (st != null && f >= st) {
          out += " · 处理 " + formatDurationZh(f - st);
        }
        return out;
      }

      function escapeAttr(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;");
      }

      function updateLiveElapsedSpans() {
        document.querySelectorAll(".task-live-elapsed").forEach(function (el) {
          const c = el.getAttribute("data-created-at");
          const s = el.getAttribute("data-started-at");
          const st = el.getAttribute("data-st");
          const t0 = parseIsoMs(c);
          if (t0 == null) {
            el.textContent = "";
            return;
          }
          const now = Date.now();
          let txt = "已用时 " + formatDurationZh(now - t0);
          const t1 = parseIsoMs(s);
          if (t1 != null && st === "running") {
            txt += " · 处理 " + formatDurationZh(now - t1);
          }
          el.textContent = txt;
        });
      }

      function ensureLiveElapsedTicker(items) {
        const hasActive = (items || []).some(function (j) {
          return j.status === "queued" || j.status === "running";
        });
        if (hasActive) {
          updateLiveElapsedSpans();
          if (!liveElapsedInterval) {
            liveElapsedInterval = setInterval(updateLiveElapsedSpans, 1000);
          }
        } else if (liveElapsedInterval) {
          clearInterval(liveElapsedInterval);
          liveElapsedInterval = null;
        }
      }

      async function loadAdminUserFilters() {
        if (!currentUser || currentUser.role !== "admin") return;
        try {
          const resp = await fetch("/auth/users");
          if (!resp.ok) return;
          const data = await resp.json();
          const names = data.usernames || [];
          const prev = taskOwnerFilter.value;
          taskOwnerFilter.innerHTML =
            '<option value="">全部用户</option>' +
            names
              .map((u) => '<option value="' + u.replace(/"/g, "&quot;") + '">' + u + "</option>")
              .join("");
          if (prev && names.indexOf(prev) !== -1) {
            taskOwnerFilter.value = prev;
          }
        } catch (e) {
          /* ignore */
        }
      }

      function updateTaskPollingFromItems(items) {
        const needs = (items || []).some(function (j) {
          return j.status === "queued" || j.status === "running";
        });
        if (needs) {
          if (!taskPollTimer) {
            taskPollTimer = setInterval(function () {
              refreshTaskList({ silent: true });
            }, 1500);
          }
        } else {
          stopTaskPolling();
        }
      }

      function renderTaskItems(items) {
        if (!items || !items.length) {
          historyWrap.classList.add("show");
          historyList.innerHTML =
            '<p class="history-meta" style="margin:0">暂无任务。任务会保存在服务器，重新登录后仍可在此查看与管理。</p>';
          ensureLiveElapsedTicker([]);
          return;
        }
        historyWrap.classList.add("show");
        historyList.innerHTML = items
          .map(function (job) {
            const ownerLine =
              currentUser && currentUser.role === "admin"
                ? '<div class="history-meta">提交人：' + (job.owner_username || "—") + "</div>"
                : "";
            const err =
              job.error_message && job.status !== "succeeded"
                ? '<div class="task-error-line">' + String(job.error_message).replace(/</g, "&lt;") + "</div>"
                : "";
            const queueLine =
              job.status === "queued" &&
              job.queue_position != null &&
              job.queue_total != null &&
              job.queue_total > 0
                ? '<div class="task-queue-meta">排队位次：第 ' +
                  job.queue_position +
                  " / " +
                  job.queue_total +
                  " 位</div>"
                : "";
            const partialPagesLine =
              job.status === "succeeded" &&
              Array.isArray(job.pdf_vl_failed_pages) &&
              job.pdf_vl_failed_pages.length
                ? '<div class="task-queue-meta">部分页转写未完成（页码：' +
                  job.pdf_vl_failed_pages.join("、") +
                  "）</div>"
                : "";
            let progressBlock = "";
            if (job.status === "running") {
              let pct = Number(job.progress_percent);
              if (!Number.isFinite(pct)) {
                pct = 0;
              }
              pct = Math.max(0, Math.min(100, pct));
              const noteRaw = job.progress_note != null ? String(job.progress_note) : "转换中…";
              const note = noteRaw.replace(/</g, "&lt;");
              let pageHint = "";
              const genericProgressNote =
                noteRaw === "转换中…" ||
                noteRaw === "开始处理…" ||
                /正在转换文档/.test(noteRaw);
              const hasPageInNote = /PDF\s*已完成\s*\d+\s*\/\s*\d+\s*页/.test(noteRaw);
              if (
                job.progress_pages_done != null &&
                job.progress_pages_total != null &&
                (genericProgressNote || !hasPageInNote)
              ) {
                pageHint =
                  " · 页 " + job.progress_pages_done + "/" + job.progress_pages_total;
              }
              progressBlock =
                '<div class="task-progress-wrap" role="progressbar" aria-valuenow="' +
                pct +
                '" aria-valuemin="0" aria-valuemax="100">' +
                '<div class="task-progress-bar-bg"><div class="task-progress-bar-fill" style="width:' +
                pct +
                '%"></div></div>' +
                '<div class="task-progress-note">' +
                note +
                pageHint +
                " · " +
                pct +
                "%</div></div>";
            }
            const canCancel = job.status === "queued" || job.status === "running";
            const cancelBtn = canCancel
              ? '<button type="button" class="task-cancel-btn" data-job-cancel="' +
                job.job_id +
                '">取消</button>'
              : "";
            const canDelete = job.status !== "running";
            const deleteBtn = canDelete
              ? '<button type="button" class="task-delete-btn" data-job-delete="' +
                job.job_id +
                '">删除记录</button>'
              : "";
            const dl =
              job.download_url && job.status === "succeeded"
                ? '<a class="download-btn" href="' +
                  job.download_url +
                  '" target="_blank" rel="noopener">下载 ZIP</a>'
                : "";
            return (
              '<div class="history-item">' +
              '<div class="task-item-main">' +
              '<div class="filename">' +
              (job.original_filename || "").replace(/</g, "&lt;") +
              "</div>" +
              ownerLine +
              (function () {
                const liveElapsedHtml =
                  job.status === "queued" || job.status === "running"
                    ? ' <span class="task-live-elapsed" data-created-at="' +
                      escapeAttr(job.created_at) +
                      '" data-started-at="' +
                      escapeAttr(job.started_at || "") +
                      '" data-st="' +
                      escapeAttr(job.status) +
                      '"></span>'
                    : "";
                return (
                  '<div class="history-meta">' +
                  "创建：" +
                  formatTime(job.created_at) +
                  (job.finished_at ? " · 结束：" + formatTime(job.finished_at) : "") +
                  totalDurationMetaLine(job) +
                  liveElapsedHtml +
                  "</div>"
                );
              })() +
              queueLine +
              partialPagesLine +
              '<span class="task-status-badge task-status-' +
              job.status +
              '">' +
              statusLabel(job.status) +
              "</span>" +
              progressBlock +
              err +
              "</div>" +
              '<div class="task-row-actions">' +
              dl +
              cancelBtn +
              deleteBtn +
              "</div>" +
              "</div>"
            );
          })
          .join("");
        ensureLiveElapsedTicker(items);
      }

      async function refreshTaskList(opts) {
        opts = opts || {};
        if (!currentUser) {
          historyWrap.classList.remove("show");
          historyList.innerHTML = "";
          return;
        }
        try {
          const params = new URLSearchParams();
          params.set("page", "1");
          params.set("page_size", "50");
          if (currentUser.role === "admin") {
            if (taskOwnerFilter.value) params.set("owner", taskOwnerFilter.value);
            if (taskStatusFilter.value) params.set("status", taskStatusFilter.value);
          }
          const resp = await fetch("/jobs?" + params.toString(), {
            credentials: "same-origin",
            cache: "no-store",
          });
          if (resp.status === 401) {
            setAuthState(null);
            return;
          }
          const data = await resp.json();
          if (!resp.ok) {
            if (!opts.silent) showToast("error", data.detail || "加载任务失败");
            return;
          }
          renderTaskItems(data.items || []);
          updateTaskPollingFromItems(data.items || []);
        } catch (e) {
          if (!opts.silent) showToast("error", "加载任务列表失败");
        }
      }

      async function pollJobUntilTerminal(jobId, generation) {
        const terminal = { succeeded: 1, failed: 1, cancelled: 1 };
        let lastPolledJob = null;
        // 任务处理进度仅在「任务列表」中展示；这里仍轮询任务以自动展示结果/Toast。

        while (true) {
          if (generation !== uploadGeneration) {
            return;
          }
          try {
            await refreshTaskList({ silent: true });
            if (generation !== uploadGeneration) {
              return;
            }
            const resp = await fetch("/jobs/" + encodeURIComponent(jobId), {
              credentials: "same-origin",
              cache: "no-store",
            });
            if (resp.status === 401) {
              setAuthState(null);
              return;
            }
            const job = await resp.json();
            if (!resp.ok) {
              if (resp.status === 404) {
                await refreshTaskList();
                if (generation === uploadGeneration) {
                  showToast("success", "该任务记录已不存在");
                }
                break;
              }
              if (generation === uploadGeneration) {
                setStatus("error", job.detail || "无法获取任务状态");
              }
              break;
            }
            lastPolledJob = job;
            if (terminal[job.status]) {
              if (generation !== uploadGeneration) {
                return;
              }
              if (job.status === "succeeded") {
                let msg = "转换完成";
                const c = parseIsoMs(job.created_at);
                const f = parseIsoMs(job.finished_at);
                if (c != null && f != null && f >= c) {
                  msg += "，总耗时 " + formatDurationZh(f - c);
                }
                if (Array.isArray(job.pdf_vl_failed_pages) && job.pdf_vl_failed_pages.length) {
                  msg += "（部分页未成功：第 " + job.pdf_vl_failed_pages.join("、") + " 页）";
                  showToast(
                    "warning",
                    "部分页转写未完成，页码：" + job.pdf_vl_failed_pages.join("、")
                  );
                }
                setStatus("success", msg);
                resultFilename.textContent = job.original_filename || "";
                downloadBtn.href = job.download_url || "#";
                result.classList.add("show");
              } else {
                setStatus("error", job.error_message || statusLabel(job.status));
              }
              await refreshTaskList();
              try {
                fileInput.value = "";
              } catch (e) {
                /* ignore */
              }
              break;
            }
          } catch (e) {
            if (generation === uploadGeneration) {
              setStatus("error", "轮询任务状态失败");
            }
            break;
          }
          await new Promise(function (r) {
            setTimeout(r, 1000);
          });
        }
      }

      themeToggle.addEventListener("click", () => {
        const current = document.body.getAttribute("data-theme") === "dark" ? "dark" : "light";
        saveTheme(current === "dark" ? "light" : "dark");
      });

      refreshTasksBtn.addEventListener("click", () => {
        refreshTaskList();
      });

      applyTaskFiltersBtn.addEventListener("click", () => {
        refreshTaskList();
      });

      historyList.addEventListener("click", async (event) => {
        const delBtn = event.target.closest("[data-job-delete]");
        if (delBtn) {
          const jobId = delBtn.getAttribute("data-job-delete");
          if (!jobId) return;
          const okDelete = await openThemedConfirm({
            title: "删除任务记录",
            message:
              "将删除该条任务记录，并尝试移除服务器上对应的输入、输出目录（若仍存在）。此操作不可恢复。",
            confirmText: "删除",
            cancelText: "取消",
            danger: true,
          });
          if (!okDelete) {
            return;
          }
          try {
            const resp = await fetch("/jobs/" + encodeURIComponent(jobId), {
              method: "DELETE",
              credentials: "same-origin",
              cache: "no-store",
            });
            const data = await resp.json().catch(() => ({}));
            if (resp.status === 401) {
              setAuthState(null);
              return;
            }
            if (!resp.ok) {
              showToast("error", data.detail || "删除失败");
              return;
            }
            showToast("success", data.message || "已删除");
            await refreshTaskList();
          } catch (e) {
            showToast("error", "删除请求失败");
          }
          return;
        }

        const btn = event.target.closest("[data-job-cancel]");
        if (!btn) return;
        const jobId = btn.getAttribute("data-job-cancel");
        if (!jobId) return;
        const okCancel = await openThemedConfirm({
          title: "取消任务",
          message:
            "确定要取消该任务吗？将立即标记为已取消；若底层转换仍在进行，结束后不会保留结果。",
          confirmText: "确认取消",
          cancelText: "返回",
          danger: true,
        });
        if (!okCancel) {
          return;
        }
        try {
          const resp = await fetch("/jobs/" + encodeURIComponent(jobId) + "/cancel", {
            method: "POST",
            credentials: "same-origin",
            cache: "no-store",
          });
          const data = await resp.json().catch(() => ({}));
          if (resp.status === 401) {
            setAuthState(null);
            return;
          }
          if (!resp.ok) {
            showToast("error", data.detail || "取消失败");
            return;
          }
          showToast("success", data.message || "已处理");
          refreshTaskList();
        } catch (e) {
          showToast("error", "取消请求失败");
        }
      });

      loginBtn.addEventListener("click", async () => {
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        if (!username || !password) {
          setStatus("error", "请输入用户名和密码");
          return;
        }
        const oldText = loginBtn.textContent;
        loginBtn.disabled = true;
        loginBtn.textContent = "登录中...";
        try {
          const resp = await fetch("/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          const payload = await resp.json();
          if (!resp.ok) {
            setStatus("error", payload.detail || "登录失败");
            return;
          }
          if (rememberMeInput.checked) {
            localStorage.setItem(STORAGE_KEYS.rememberedUser, username);
          } else {
            localStorage.removeItem(STORAGE_KEYS.rememberedUser);
          }
          passwordInput.value = "";
          setAuthState(payload);
          setStatus("success", "登录成功");
        } catch (error) {
          setStatus("error", "登录请求失败");
        } finally {
          loginBtn.disabled = false;
          loginBtn.textContent = oldText;
        }
      });

      [usernameInput, passwordInput].forEach((el) => {
        el.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            loginBtn.click();
          }
        });
      });

      passwordToggle.addEventListener("click", () => {
        const isPassword = passwordInput.type === "password";
        passwordInput.type = isPassword ? "text" : "password";
        passwordToggle.setAttribute("aria-label", isPassword ? "隐藏密码" : "显示密码");
        passwordToggle.setAttribute("title", isPassword ? "隐藏密码" : "显示密码");
      });

      forgotPasswordLink.addEventListener("click", (event) => {
        event.preventDefault();
        setStatus("error", "请联系管理员重置密码");
      });

      logoutBtn.addEventListener("click", async () => {
        await fetch("/auth/logout", { method: "POST" });
        setAuthState(null);
        setStatus("success", "已退出登录");
      });

      function openPicker() {
        fileInput.click();
      }

      dropzone.addEventListener("click", openPicker);
      dropzone.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          openPicker();
        }
      });

      fileInput.addEventListener("change", () => {
        if (fileInput.files && fileInput.files[0]) {
          setSelectedFile(fileInput.files[0]);
          resetResult();
        }
      });

      ["dragenter", "dragover"].forEach((eventName) => {
        dropzone.addEventListener(eventName, (event) => {
          event.preventDefault();
          dropzone.classList.add("dragover");
          if (dropzoneText) dropzoneText.textContent = "松手即可上传";
          if (dropzoneHint) dropzoneHint.textContent = "松开后将自动解析为 Markdown";
        });
      });

      ["dragleave", "drop"].forEach((eventName) => {
        dropzone.addEventListener(eventName, (event) => {
          event.preventDefault();
          dropzone.classList.remove("dragover");
          if (dropzoneText) dropzoneText.textContent = defaultDropzoneText;
          if (dropzoneHint) dropzoneHint.textContent = defaultDropzoneHint;
        });
      });

      window.addEventListener("dragenter", (event) => {
        event.preventDefault();
        windowDragDepth += 1;
        document.body.classList.add("window-dragging");
      });

      window.addEventListener("dragleave", (event) => {
        event.preventDefault();
        windowDragDepth = Math.max(0, windowDragDepth - 1);
        if (windowDragDepth === 0) {
          document.body.classList.remove("window-dragging");
        }
      });

      window.addEventListener("drop", (event) => {
        event.preventDefault();
        windowDragDepth = 0;
        document.body.classList.remove("window-dragging");
      });

      window.addEventListener("dragover", (event) => {
        event.preventDefault();
      });

      dropzone.addEventListener("drop", (event) => {
        const files = event.dataTransfer && event.dataTransfer.files;
        if (!files || !files.length) {
          return;
        }
        const file = files[0];
        fileInput.files = files;
        setSelectedFile(file);
        resetResult();
      });

      function postJobsWithUploadProgress(formData, myGen) {
        const progressText = progressWrap.querySelector(".progress-text");
        return new Promise(function (resolve, reject) {
          const xhr = new XMLHttpRequest();
          xhr.open("POST", "/jobs");
          xhr.withCredentials = true;
          uploadXhr = xhr;
          let uploadT0 = 0;
          xhr.upload.addEventListener("progress", function (e) {
            if (myGen !== uploadGeneration) {
              return;
            }
            const fileSize = currentFile && currentFile.size ? currentFile.size : 0;
            const total =
              e.lengthComputable && e.total > 0 ? e.total : fileSize > 0 ? fileSize : 0;
            const elapsedSec = uploadT0 > 0 ? (performance.now() - uploadT0) / 1000 : 0;
            if (total > 0 && progressFill) {
              progressWrap.classList.add("progress-upload");
              const pct = Math.min(100, Math.round((e.loaded / total) * 100));
              progressFill.style.width = pct + "%";
              if (progressTrack) {
                progressTrack.setAttribute("aria-valuenow", String(pct));
              }
              const eta = formatUploadEta(e.loaded, total, elapsedSec);
              progressText.textContent =
                "上传中 " +
                pct +
                "%（" +
                formatBytes(e.loaded) +
                " / " +
                formatBytes(total) +
                "）" +
                eta;
            } else {
              progressWrap.classList.remove("progress-upload");
              if (progressFill) progressFill.style.width = "0%";
              if (progressTrack) progressTrack.setAttribute("aria-valuenow", "0");
              progressText.textContent = "上传中… " + formatBytes(e.loaded);
            }
          });
          xhr.onload = function () {
            if (uploadXhr === xhr) uploadXhr = null;
            if (myGen !== uploadGeneration) {
              return;
            }
            let payload = null;
            try {
              payload = xhr.responseText ? JSON.parse(xhr.responseText) : null;
            } catch (err) {
              payload = { detail: xhr.responseText || "响应解析失败" };
            }
            resolve({ ok: xhr.status >= 200 && xhr.status < 300, status: xhr.status, payload: payload });
          };
          xhr.onerror = function () {
            if (uploadXhr === xhr) uploadXhr = null;
            if (myGen !== uploadGeneration) {
              return;
            }
            reject(new Error("network"));
          };
          xhr.onabort = function () {
            if (uploadXhr === xhr) uploadXhr = null;
            if (myGen !== uploadGeneration) {
              return;
            }
            reject(new Error("aborted"));
          };
          uploadT0 = performance.now();
          xhr.send(formData);
        });
      }

      async function uploadAndConvert() {
        resetResult();
        resetProgressBar();
        progressWrap.classList.remove("show");
        statusBox.className = "status-box";
        statusBox.textContent = "";
        if (!currentFile) {
          setStatus("error", "请先选择要上传的文件");
          return;
        }
        const myGen = ++uploadGeneration;
        const oldText = convertBtn.textContent;
        convertBtn.disabled = true;
        convertBtn.textContent = "提交中...";
        const progressText = progressWrap.querySelector(".progress-text");
        try {
          progressWrap.classList.add("show");
          progressWrap.classList.add("progress-upload");
          if (progressFill) progressFill.style.width = "0%";
          if (progressTrack) progressTrack.setAttribute("aria-valuenow", "0");
          progressText.textContent = "开始上传…";
          if (uploadCancelBtn) {
            uploadCancelBtn.hidden = false;
            uploadCancelBtn.disabled = false;
          }

          const formData = new FormData();
          formData.append("file", currentFile);

          const { ok, status, payload } = await postJobsWithUploadProgress(formData, myGen);

          if (myGen !== uploadGeneration) {
            return;
          }
          // 上传请求已经结束：进入任务创建/轮询阶段，不再需要「取消上传」按钮。
          if (uploadCancelBtn) {
            uploadCancelBtn.hidden = true;
            uploadCancelBtn.disabled = false;
          }
          if (progressFill) progressFill.style.width = "100%";
          if (progressTrack) progressTrack.setAttribute("aria-valuenow", "100");
          progressText.textContent = "上传完成，正在创建任务…";

          if (status === 401) {
            setAuthState(null);
            setStatus("error", "登录已失效，请重新登录");
            resetProgressBar();
            progressWrap.classList.remove("show");
            return;
          }
          if (!ok) {
            setStatus("error", (payload && payload.detail) || "创建任务失败，请稍后重试");
            resetProgressBar();
            progressWrap.classList.remove("show");
            return;
          }
          await refreshTaskList();
          resetProgressBar();
          // 上传完成后不再展示顶部任务进度框（任务列表里已有进度）。
          progressWrap.classList.remove("show");
          const jobId = payload && payload.job_id;
          if (jobId) {
            convertBtn.textContent = "处理中...";
            await pollJobUntilTerminal(jobId, myGen);
          } else {
            setStatus("error", "未返回任务 ID");
            resetProgressBar();
            progressWrap.classList.remove("show");
          }
        } catch (error) {
          if (myGen === uploadGeneration) {
            const message = String((error && error.message) || "");
            if (message === "aborted") {
              setStatus("success", "已取消上传");
              resetProgressBar();
              progressWrap.classList.remove("show");
            } else {
              setStatus("error", "请求失败，请检查网络或服务状态");
              resetProgressBar();
              progressWrap.classList.remove("show");
            }
          }
        } finally {
          convertBtn.textContent = oldText;
          if (uploadCancelBtn) {
            uploadCancelBtn.hidden = true;
            uploadCancelBtn.disabled = false;
          }
          updateConvertButtonState();
        }
      }

      convertBtn.addEventListener("click", uploadAndConvert);
      if (uploadCancelBtn) {
        uploadCancelBtn.addEventListener("click", async () => {
          if (!uploadXhr) return;
          const okCancel = await openThemedConfirm({
            title: "取消上传",
            message: "确定取消当前上传吗？取消后不会创建转换任务。",
            confirmText: "确认取消",
            cancelText: "返回",
            danger: true,
          });
          if (!okCancel) return;
          if (uploadCancelBtn) uploadCancelBtn.disabled = true;
          try {
            uploadXhr.abort();
          } catch (e) {
            /* ignore */
          }
        });
      }
      applyTheme(localStorage.getItem(STORAGE_KEYS.theme) || "dark");
      const rememberedUser = localStorage.getItem(STORAGE_KEYS.rememberedUser) || "";
      if (rememberedUser) {
        usernameInput.value = rememberedUser;
        rememberMeInput.checked = true;
      }
      updateConvertButtonState();

      (async function initAuth() {
        try {
          const resp = await fetch("/auth/me");
          if (!resp.ok) {
            setAuthState(null);
            return;
          }
          const payload = await resp.json();
          setAuthState(payload);
        } catch (error) {
          setAuthState(null);
        }
      })();
    </script>
  </body>
